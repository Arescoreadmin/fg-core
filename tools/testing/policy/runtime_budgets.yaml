global_pr_budget_seconds: 600
lanes:
  fg-fast:
    # nominal_max_seconds: gate that triggers a warning when exceeded.
    # hard_max_seconds: CI-variance tolerance (+3.3% over nominal_max).
    #   Accounts for subprocess wrapper overhead (~18-20s on GH Actions 2-core
    #   runners) that is not included in pytest's own reported duration.
    #   See timing_model=ci_variance_tolerance in artifacts/ci/fg_fast_duration.json.
    max_seconds: 900
    hard_max_seconds: 930
    timing_model: ci_variance_tolerance
    warn_pct: 20
    fail_pct: 40
  fg-contract:
    max_seconds: 900
    warn_pct: 20
    fail_pct: 40
  fg-security:
    max_seconds: 900
    warn_pct: 20
    fail_pct: 40

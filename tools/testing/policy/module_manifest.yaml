version: 1
modules:
  - module_id: control_plane
    plane: control
    route_prefixes:
      - /v2/control-plane
    required_scopes:
      - control_plane.read
      - control_plane.write
    required_test_category:
      - unit
      - contract
      - security

  - module_id: testing_module
    plane: security
    route_prefixes:
      - /control-plane/v2/testing
    required_scopes:
      - control-plane:read
      - control-plane:admin
    required_test_category:
      - unit
      - contract
      - security
      - integration

  - module_id: ai_plane_extension
    plane: control
    route_prefixes:
      - /ai-plane
    required_scopes:
      - control_plane.read
      - control_plane.write
    required_test_category:
      - unit
      - security

  - module_id: enterprise_controls_extension
    plane: control
    route_prefixes:
      - /ui/controls
      - /ui/compliance
    required_scopes:
      - control_plane.read
      - control_plane.write
    required_test_category:
      - unit
      - security

  - module_id: evidence_anchor_extension
    plane: control
    route_prefixes:
      - /control-plane/evidence
    required_scopes:
      - control_plane.read
      - control_plane.write
    required_test_category:
      - unit
      - security
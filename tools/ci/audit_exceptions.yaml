# H13.5 Audit Coverage Exception Registry
#
# Every mutation route that lacks a direct audit call (emit_engagement_audit_event /
# audit_atomicity_svc.emit) must appear here with a non-expired expiration_date.
#
# Required fields per entry:
#   id                   — unique exception identifier (e.g. EXC-FA-001)
#   function_name        — exact Python function name
#   file                 — repo-relative path (e.g. api/field_assessment.py)
#   reason               — technical explanation of why the route is unaudited
#   owner                — team/person accountable for remediation
#   expiration_date      — YYYY-MM-DD; exception auto-fails after this date
#   approval_reference   — PR or ticket that approved the exception
#
# Debt-tracking fields (optional but strongly encouraged):
#   jira_ticket          — tracking ticket for the remediation work
#   business_justification — why leaving this unaudited is acceptable right now
#   approval_date        — YYYY-MM-DD when the exception was approved
#   approved_by          — who approved (github handle or team lead)
#
# These optional fields are reported in artifacts/audit_exception_report.json
# every CI run. Missing jira_ticket or approved_by entries are flagged so
# the debt picture stays visible.
#
# NO permanent exceptions are allowed. All entries must have an expiration_date.
# When a route is remediated, remove its entry here and add the audit call.

exceptions:

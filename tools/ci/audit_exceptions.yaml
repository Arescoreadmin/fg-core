    function_name: initiate_msgraph_scan
    file: api/field_assessment.py
    reason: >
      Connector scan launcher; fires an async job and returns a run_id. Audit
      coverage deferred to H13.5-remediation because the async job result path
      is the semantically meaningful mutation and requires a different audit
      pattern (job-completion hook). Interim: scan job IDs are logged in the
      connector runs table which itself has audit coverage.
    owner: field-assessment-team
    expiration_date: "2026-09-01"
    approval_reference: H13.5-bootstrap
    jira_ticket: null
    business_justification: >
      Async scan launchers return a run_id; the job-completion path is the
      auditable event. Acceptable until connector-run audit hooks are built.

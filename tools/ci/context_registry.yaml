version: 1

# ─────────────────────────────────────────────────────────────────────────────
# ADDING A NEW AUTHORITY
#
# Add one entry under `contexts:`. No Python changes required.
#
# Required fields: description, owners, paths, tests, dependencies, gates, smoke
# gates keys: authority | contract | privacy | security  (boolean values)
# ─────────────────────────────────────────────────────────────────────────────

global:
  always_tests:
    - tests/test_plane_registry.py
    - tests/test_platform_inventory_determinism.py

  always_gates:
    - [python, tools/ci/check_authority_integration.py]
    - [python, tools/ci/check_plane_registry.py]

  # Files whose change triggers the CGIN privacy gate regardless of context.
  privacy_paths:
    - services/cgin/
    - tools/ci/check_cgin_privacy.py
    - authority_manifest.yaml

  # Files whose change triggers the contract gate regardless of context.
  contract_paths:
    - api/
    - services/
    - authority_manifest.yaml
    - services/plane_registry/

gate_commands:
  privacy: [python, tools/ci/check_cgin_privacy.py]
  contract: [make, fg-contract]

contexts:

  # ── CGIN Privacy Layer ────────────────────────────────────────────────────
  cgin:
    description: CGIN Privacy Layer — cross-authority tenant anonymization
    owners:
      - platform
    paths:
      - services/cgin/
      - tools/ci/check_cgin_privacy.py
      - tests/test_cgin_privacy.py
    tests:
      - tests/test_cgin_privacy.py
      - tests/test_h14_6_5a_evidence_hardening.py::TestCGINSnapshot
    dependencies: []
    gates:
      authority: false
      contract: false
      privacy: true
      security: false
    smoke:
      enabled: false

  # ── Evidence Authority ────────────────────────────────────────────────────
  evidence_authority:
    description: Evidence Authority — evidence ingestion, status, and hardening
    owners:
      - evidence
    paths:
      - services/evidence_authority/
      - api/evidence_authority.py
      - api/db_models_evidence_authority.py
    tests:
      - tests/test_evidence_authority.py
      - tests/test_ea_canonical_14_6_1.py
      - tests/test_h14_6_5_evidence_status_model.py
    dependencies:
      - cgin
    gates:
      authority: true
      contract: true
      privacy: false
      security: false
    smoke:
      enabled: true

  # ── Verification Authority ────────────────────────────────────────────────

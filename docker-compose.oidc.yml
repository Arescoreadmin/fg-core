# docker-compose.oidc.yml — Compose override: wire admin-gateway to Keycloak IdP (Task 6.1)
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.oidc.yml \
#     --profile admin --profile idp up -d
#
# admin-gateway reaches Keycloak over the internal compose network (fg-idp:8080).
# FG_KEYCLOAK_BASE_URL uses the internal Docker DNS name, not the published host port.
# FG_KEYCLOAK_CLIENT_SECRET must be provided via env or .env file in production.

services:
  admin-gateway:
    environment:
      FG_ENV: dev
      FG_DEV_AUTH_BYPASS: "false"
      FG_KEYCLOAK_BASE_URL: "http://fg-idp:8080"
      FG_KEYCLOAK_REALM: "FrostGate"
      FG_KEYCLOAK_CLIENT_ID: "${FG_KEYCLOAK_CLIENT_ID:-fg-service}"
      FG_KEYCLOAK_CLIENT_SECRET: "${FG_KEYCLOAK_CLIENT_SECRET:?set FG_KEYCLOAK_CLIENT_SECRET}"
      FG_OIDC_REDIRECT_URL: "${FG_OIDC_REDIRECT_URL:-http://localhost:18080/auth/callback}"
      FG_OIDC_SCOPES: "openid profile email"
      # Internal token for gateway→core proxying.  Must match FG_INTERNAL_AUTH_SECRET
      # (or FG_ADMIN_GATEWAY_INTERNAL_TOKEN) on the core service.  Using the
      # internal token activates the admin_internal_token auth path in core so
      # bind_tenant_id() accepts an explicit tenant_id from query params.
      AG_CORE_INTERNAL_TOKEN: "${FG_INTERNAL_AUTH_SECRET:?set FG_INTERNAL_AUTH_SECRET in .env or env/prod.env}"
    depends_on:
      fg-idp:
        condition: service_healthy

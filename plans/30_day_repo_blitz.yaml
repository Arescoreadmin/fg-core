plan_id: frostgate-30-day-repo-blitz
version: 3

phases:
  - id: "phase-1"
    name: "Lock Core Invariants"

    modules:
      - id: "1.0"
        name: "Tenant Isolation"

        tasks:
          - id: "1.1"
            title: "Remove Optional tenant_id"
            status: "pending"
            depends_on: []
            definition_of_done:
              - "No Optional tenant_id in production paths"
            validation:
              - "Optional tenant_id removed from internal enforcement paths targeted by this task"
              - "Known boundary/auth/audit compatibility paths may remain optional"
              - "Fast lane passes"
            validation_commands:
             - "rg -n 'Optional\\[.*tenant_id|tenant_id:\\s*Optional' api/auth_scopes/validation.py api/tenant_usage.py api/middleware/dos_guard.py api/key_rotation.py || true"

          - id: "1.2"
            title: Enforce tenant_id at entry points

            definition_of_done:
              - Unscoped entry points reject missing tenant_id
              - Scoped auth-derived tenant binding still works where intended

            validation:
              - Unscoped requests fail when tenant_id is missing
              - Scoped requests without explicit tenant_id still succeed where auth binding is intended
              - Fast lane passes

            validation_commands:
              - pytest -q tests/test_tenant_binding.py tests/security/test_tenant_contract_endpoints.py || true
              - make fg-fast

            allowed_files:
              - api/admin.py
              - api/control_plane_v2.py
              - api/decisions.py
              - api/dev_events.py
              - api/ingest.py
              - api/keys.py
              - api/stats.py
              - api/ui_dashboards.py
              - tests/**

            max_files_changed: 20

            forbidden_files:
              - contracts/**
              - schemas/api/openapi.json
              - .github/workflows/**

          - id: "1.3"
            title: "Audit read paths"
            status: "pending"
            depends_on: ["1.2"]
            definition_of_done:
              - "All reads filtered by tenant_id"
            validation:
              - "Cross-tenant read returns empty or not-found"
              - "Fast lane passes"
            validation_commands:
              - "pytest -q tests/security -k 'tenant and read' || true"
              - "make fg-fast"

          - id: "1.4"
            title: "Audit export paths"
            status: "pending"
            depends_on: ["1.3"]
            definition_of_done:
              - "Exports enforce tenant boundaries"
            validation:
              - "Cannot export other tenant data"
              - "Fast lane passes"
            validation_commands:
              - "pytest -q tests/security -k 'tenant and export' || true"
              - "make fg-fast"

          - id: "1.5"
            title: "Background job isolation"
            status: "pending"
            depends_on: ["1.4"]
            definition_of_done:
              - "Jobs require tenant_id"
            validation:
              - "Job fails without tenant_id"
              - "Fast lane passes"
            validation_commands:
              - "pytest -q tests -k 'tenant and job' || true"
              - "make fg-fast"

      - id: "2.0"
        name: "Auth Boundary"

        tasks:
          - id: "2.1"
            title: "Remove human auth from core"
            status: "pending"
            depends_on: ["1.5"]
            definition_of_done:
              - "Core does not accept human/browser auth flows"
            validation:
              - "Direct human-auth path to core is rejected"
              - "Fast lane passes"
            validation_commands:
              - "pytest -q tests -k 'auth and core' || true"
              - "make fg-fast"

          - id: "2.2"
            title: "Enforce gateway-only access"
            status: "pending"
            depends_on: ["2.1"]
            definition_of_done:
              - "Human access goes through gateway only"
            validation:
              - "Gateway path works and direct core path is rejected"
              - "Fast lane passes"
            validation_commands:
              - "pytest -q tests -k 'gateway and auth' || true"
              - "make fg-fast"

      - id: "3.0"
        name: "CI Stability"

        tasks:
          - id: "3.1"
            title: "Fix import paths"
            status: "pending"
            depends_on: ["2.2"]
            definition_of_done:
              - "Repo commands run from clean shell without import path failures"
            validation:
              - "Harness and tests run without ModuleNotFoundError"
            validation_commands:
              - "python tools/plan/taskctl.py status"
              - "make fg-fast"

          - id: "3.2"
            title: "Remove flaky tests"
            status: "pending"
            depends_on: ["3.1"]
            definition_of_done:
              - "Fast lane is deterministic across repeated runs"
            validation:
              - "Repeated fast-lane runs produce identical pass/fail behavior"
            validation_commands:
              - "make fg-fast"
              - "make fg-fast"

          - id: "3.3"
            title: "Lock fg-fast"
            status: "pending"
            depends_on: ["3.2"]
            definition_of_done:
              - "fg-fast is the trusted local confidence lane"
            validation:
              - "fg-fast passes cleanly and predictably"
            validation_commands:
              - "make fg-fast"

      - id: "4.0"
        name: "Production Validation"

        tasks:
          - id: "4.1"
            title: "Enforce required env vars"
            status: "pending"
            depends_on: ["3.3"]
            definition_of_done:
              - "Startup fails when required production env vars are missing"
              - "Required production env vars are defined in one authoritative place"
              - "CI and runtime startup use the same source of truth"
            validation:
              - "Production validation checks fail closed"
              - "Prod-like startup fails when required env vars are missing"
              - "Prod-like startup succeeds when required env vars are present"
            validation_commands:
              - "python tools/ci/check_required_env.py"
              - "env FG_ENV=production python tools/ci/check_required_env.py || true"
              - "env FG_ENV=production DATABASE_URL=postgresql://example FG_SIGNING_SECRET=test-signing-secret FG_INTERNAL_AUTH_SECRET=test-internal-secret python tools/ci/check_required_env.py"
              - ".venv/bin/pytest -q tests -k 'required_env or prod_startup or startup_config'"
              - "make fg-fast"

          - id: "4.2"
            title: "Remove silent defaults"
            status: "pending"
            depends_on: ["4.1"]

            definition_of_done:
              - "Production does not silently supply critical defaults"
              - "Critical production secrets/config must be explicitly provided"
              - "Compose/runtime paths do not hide missing critical config with fallback defaults"

            validation:
              - "Missing critical config causes explicit failure"
              - "Blank critical config causes explicit failure"
              - "Prod-like startup/compose path does not silently backfill critical defaults"
              - "Fast lane passes"

            validation_commands:
              - "! env FG_ENV=production python tools/ci/check_required_env.py"
              - pytest -q tests -k "required_env or prod_startup or startup_config or silent_default"
              - docker compose --env-file .env.ci -f docker-compose.yml -f docker-compose.lockdown.yml config >/tmp/fg.compose.rendered.yml
              - "! rg -n 'FG_API_KEY:.*:-|FG_WEBHOOK_SECRET:.*:-|FG_SIGNING_SECRET:.*:-|FG_INTERNAL_AUTH_SECRET:.*:-|DATABASE_URL:.*:-' docker-compose.yml docker-compose.lockdown.yml"
              - make fg-fast

          - id: "5.1"
            title: "Docker compose cleanup"
            status: "pending"
            depends_on: ["4.2"]

            definition_of_done:
              - "Compose stack is reproducible and boots expected core services"
              - "Core profile renders and starts with explicit required config"
              - "Bootstrap and migration steps complete successfully"
              - "frostgate-core reaches healthy status under the CI-like compose path"

            validation:
              - "Compose config renders cleanly with the CI env file"
              - "Core profile can be torn down and brought back up reproducibly"
              - "Bootstrap exits successfully"
              - "Migration exits successfully"
              - "frostgate-core reaches healthy status"
              - "Compose service state is stable after startup"

            validation_commands:
              - "docker compose --env-file .env.ci --profile core -f docker-compose.yml -f docker-compose.lockdown.yml config >/tmp/fg.compose.rendered.yml"
              - "docker compose --env-file .env.ci --profile core down -v"
              - "docker compose --env-file .env.ci --profile core up -d --build"
              - "timeout 120 sh -c 'until docker ps --filter name=fg-core-frostgate-core-1 --filter health=healthy --format \"{{.Names}}\" | grep -q frostgate-core; do sleep 3; done'"
              - "docker compose --env-file .env.ci --profile core ps >/tmp/fg.compose.ps.txt"
              - "docker compose --env-file .env.ci --profile core logs frostgate-migrate --tail=200 >/tmp/fg.migrate.log"
              - "docker compose --env-file .env.ci --profile core logs frostgate-core --tail=200 >/tmp/fg.core.log"
              - "docker inspect $(docker compose --env-file .env.ci --profile core ps -qa frostgate-migrate) --format '{{.State.ExitCode}}' >/tmp/fg.migrate.exit"
              - "docker inspect $(docker compose --env-file .env.ci --profile core ps -q frostgate-core) --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' >/tmp/fg.core.health"
              - "test \"$(cat /tmp/fg.migrate.exit)\" = \"0\""
              - "test \"$(cat /tmp/fg.core.health)\" = \"healthy\""

      - id: "6.0"
        name: "Auth Flow"

        tasks:
          - id: "6.1"
            title: "Keycloak integration"
            status: "pending"
            depends_on: ["5.1"]

            definition_of_done:
              - "Keycloak realm/client integration is wired correctly"
              - "OIDC discovery is reachable through the intended runtime path"
              - "Configured client can obtain a valid token from Keycloak"
              - "Gateway/runtime wiring fails explicitly when OIDC config is missing or invalid"

            validation:
              - "OIDC discovery endpoint returns valid metadata"
              - "Token path is functional for the configured client"
              - "Auth configuration is present and wired to the intended realm/client"
              - "Broken or missing OIDC config causes explicit failure"
              - "Fast lane passes"

            validation_commands:
              - "make fg-idp-validate"
              - ".venv/bin/pytest -q tests -k 'keycloak or oidc or auth_flow'"
              - "make fg-fast"

      - id: "6.2"
        title: "End-to-end auth flow"
        status: "pending"
        depends_on: ["6.1"]
        definition_of_done:
          - "A Keycloak-issued token for the configured realm/client is accepted on the intended gateway entry path"
          - "Gateway-authenticated requests reach protected core functionality without local bypasses or alternate trust paths"
          - "JWT validation enforces issuer, audience, signature, and expiry"
          - "Authorization enforces required scopes and tenant isolation on protected routes"
          - "Misconfigured OIDC discovery, JWKS, issuer, audience, or client wiring fails explicitly"
        validation:
          - "Valid token request to a protected endpoint returns success"
          - "Request without token returns 401 or repository-defined equivalent"
          - "Request with tampered token returns 401 or repository-defined equivalent"
          - "Request with wrong issuer or audience returns 401 or repository-defined equivalent"
          - "Request with valid token but insufficient scope returns 403 or repository-defined equivalent"
          - "Request with valid token for the wrong tenant is denied"
          - "OIDC/JWKS misconfiguration fails closed and does not fall back silently"
          - "Fast lane and codex gates remain green"
        validation_commands:
          - "make fg-idp-validate"
          - ".venv/bin/pytest -q tests -k 'auth_flow or keycloak or oidc or jwt'"
          - ".venv/bin/pytest -q tests/security -k 'tenant or scope or auth'"
          - "make fg-fast"
          - "bash codex_gates.sh"

      - id: "7.0"
        name: "Observability"

        tasks:
          - id: "7.1"
            title: "Structured logging (enforced, auditable)"
            status: "pending"
            depends_on: ["6.2"]

            definition_of_done:
              - "All request-handling and security-relevant logs are structured JSON"
              - "Every log entry includes: request_id, timestamp, service, level, event"
              - "Authenticated request logs include tenant_id and subject where available"
              - "Security events explicitly logged: auth success, auth failure, token validation failure, scope denial, tenant denial"
              - "Error logs include structured error metadata: error_type, message, exception or stack equivalent"
              - "No plaintext/unstructured logging remains in request-handling paths"
              - "Structured logging does not break pytest log capture, wrapper-managed handlers, or embedded execution"
              - "Logging initialization is idempotent and does not clobber existing handlers/sinks"
              - "Logging does not leak secrets: Authorization headers, bearer tokens, signing keys, client secrets, passwords"
              - "Gateway, core, agent, and jobs emit compatible structured log schema"

            validation:
              - "Successful authenticated request logs include request_id, tenant_id, and subject"
              - "Failed authentication logs include explicit failure reason"
              - "Authorization failure logs include scope or tenant denial context"
              - "Structured log output parses successfully as JSON"
              - "Error paths emit structured request/error log entries even when downstream raises"
              - "No sensitive values appear in logs"
              - "Fast lane and codex gates remain green"

            validation_commands:
              - ".venv/bin/pytest -q tests -k 'logging or auth or security'"
              - ".venv/bin/pytest -q admin_gateway/tests/test_structured_logging_task71.py"
              - ".venv/bin/python - << 'PY'\nimport json, subprocess\np = subprocess.run(['make','fg-fast'], capture_output=True, text=True)\nfor line in p.stdout.splitlines():\n    if line.strip().startswith('{'):\n        json.loads(line)\nprint('structured-parse-ok')\nPY"
              - "make fg-fast"
              - "bash codex_gates.sh"

          - id: "7.2"
            title: "End-to-end request tracing (propagation + integrity)"
            status: "pending"
            depends_on: ["7.1"]

            definition_of_done:
              - "Every inbound request is assigned a request_id if not already present"
              - "Malformed or unsafe inbound request_id values are rejected and replaced with a canonical generated ID"
              - "request_id is propagated across all in-repo internal request boundaries used today"
              - "request_id is included in all request-lifecycle logs"
              - "request_id cannot be overridden or dropped mid-flow"
              - "Core API request logs include request_id for both success and exception paths"
              - "Tracing does not weaken auth, tenant isolation, or trust boundaries"
              - "No new tracing dependency or side-channel is introduced"

            validation:
              - "A single request produces logs across gateway and core with the same request_id"
              - "Missing request_id generates a canonical ID that is propagated"
              - "Malformed request_id is replaced safely"
              - "Attempted mid-flow override is prevented or ignored"
              - "Failure-path logs still contain request_id and request metadata"
              - "Fast lane and codex gates remain green"

            validation_commands:
              - ".venv/bin/pytest -q tests -k 'trace or request_id or propagation'"
              - ".venv/bin/pytest -q tests/security -k 'logging or trace or context'"
              - ".venv/bin/pytest -q admin_gateway/tests/test_request_tracing_task72.py tests/test_request_tracing_task72.py"
              - "make fg-fast"
              - "bash codex_gates.sh"

          - id: "7.3"
            title: "Distributed request tracing across async boundaries"
            status: "pending"
            depends_on: ["7.2"]

            definition_of_done:
              - "Parent request_id is propagated into direct-invocation async job boundaries"
              - "Parent request_id is propagated into broker/message metadata where such paths exist"
              - "Worker/job execution restores a canonical request_id from parent context when provided"
              - "Jobs do not generate a fresh request_id when a valid parent request_id exists"
              - "Invalid or malformed incoming trace metadata is rejected and replaced safely"
              - "Job and worker logs emit the same request_id as the originating parent operation when available"
              - "Trace propagation is immutable within worker execution"
              - "Tracing across async boundaries does not introduce spoofing, tenant confusion, or trust bypass"

            validation:
              - "Parent request_id is preserved across direct async job execution"
              - "Message metadata carries request_id where broker path exists"
              - "Job logs contain the originating request_id instead of a fresh unrelated value"
              - "Invalid trace metadata returns None or is regenerated only at the correct boundary"
              - "Worker/job code cannot override upstream request_id mid-execution"
              - "Fast lane and codex gates remain green"

            validation_commands:
              - ".venv/bin/pytest -q tests -k 'trace or request_id or propagation or async or worker'"
              - ".venv/bin/pytest -q tests/test_request_propagation_task73.py tests/test_request_tracing_task72.py tests/test_job_logging_idempotency.py"
              - ".venv/bin/pytest -q tests/security -k 'trace or context or propagation'"
              - "make fg-fast"
              - "bash codex_gates.sh"

      - id: "8.0"
        name: "Health"

        tasks:
          - id: "8.1"
            title: "Health endpoints (truthful, unique, dependency-aware)"
            status: "pending"
            depends_on: ["7.3"]

            definition_of_done:
              - "Health/readiness/startup endpoints are unique, documented, and correctly wired"
              - "Health endpoints reflect actual dependency state instead of superficial uptime"
              - "Readiness fails when critical dependencies are unavailable"
              - "Liveness remains lightweight and does not depend on heavy downstream checks"
              - "Health endpoints do not expose sensitive internal state"
              - "Route inventory and health contract are aligned for health surfaces"

            validation:
              - "Health endpoints return expected status codes and payloads"
              - "Dependency failure changes readiness behavior correctly"
              - "No duplicate/conflicting health routes remain"
              - "Route inventory and fast lane remain green"

            validation_commands:
              - ".venv/bin/pytest -q tests -k 'health or readiness or startup'"
              - ".venv/bin/pytest -q admin_gateway/tests/test_health.py"
              - "make fg-fast"
              - "bash codex_gates.sh"

      - id: "9.0"
        name: "Core Flows"

        tasks:
          - id: "9.1"
            title: "Create tenant through supported product path"
            status: "pending"
            depends_on: ["8.1"]

            definition_of_done:
              - "A tester can create a tenant through the intended supported API/gateway path"
              - "Tenant creation enforces auth, tenant model invariants, and input validation"
              - "Created tenant is persisted and observable through the intended read path"
              - "Errors are explicit and actionable"

            validation:
              - "Happy-path tenant creation succeeds"
              - "Invalid payload fails explicitly"
              - "Unauthorized tenant creation is rejected"
              - "Fast lane remains green"

            validation_commands:
              - ".venv/bin/pytest -q tests -k 'tenant and create'"
              - "make fg-fast"
              - "bash codex_gates.sh"

          - id: "9.2"
            title: "Run primary audit/control flow"
            status: "pending"
            depends_on: ["9.1"]

            definition_of_done:
              - "A tester can trigger the intended core audit/control flow through supported interfaces"
              - "Flow enforces auth, tenant isolation, and required preconditions"
              - "Resulting state or artifacts are persisted and retrievable"
              - "Failure modes are explicit"

            validation:
              - "Primary flow completes successfully end-to-end"
              - "Cross-tenant or unauthorized execution is denied"
              - "Missing prerequisites fail explicitly"
              - "Fast lane remains green"

            validation_commands:
              - ".venv/bin/pytest -q tests -k 'audit or control or flow'"
              - "make fg-fast"
              - "bash codex_gates.sh"

          - id: "9.3"
            title: "Retrieve and export resulting artifacts"
            status: "pending"
            depends_on: ["9.2"]

            definition_of_done:
              - "Tester can retrieve/export resulting artifacts without manual DB or shell intervention"
              - "Export/retrieval paths preserve tenant boundaries and auth checks"
              - "Export payload or artifact shape is stable enough for tester use"
              - "Errors are explicit when result is missing or unauthorized"

            validation:
              - "End-to-end tester flow from create → run → export succeeds"
              - "Unauthorized export is denied"
              - "Missing result returns explicit not-found/error path"
              - "Fast lane remains green"

            validation_commands:
              - ".venv/bin/pytest -q tests -k 'export or result or retrieval'"
              - "make fg-fast"
              - "bash codex_gates.sh"

      - id: "10.0"
        name: "Tester Kit"

        tasks:
          - id: "10.1"
            title: "Repeatable seed/bootstrap script"
            status: "pending"
            depends_on: ["9.3"]

            definition_of_done:
              - "A fresh environment can be seeded repeatably through one supported command/script"
              - "Seed path is idempotent or fails explicitly when rerun"
              - "Seeded state is sufficient to exercise primary tester flows"
              - "No manual hidden steps are required"

            validation:
              - "Seed path succeeds on a clean environment"
              - "Seed rerun behavior is deterministic"
              - "Seeded environment supports primary flow smoke test"
              - "Fast lane remains green"

            validation_commands:
              - ".venv/bin/pytest -q tests -k 'seed or bootstrap'"
              - "make fg-fast"
              - "bash codex_gates.sh"

          - id: "10.2"
            title: "Tester collection and quickstart"
            status: "pending"
            depends_on: ["10.1"]

            definition_of_done:
              - "A tester has a working request collection and minimal quickstart path"
              - "Collection uses current supported endpoints only"
              - "Collection examples align with seeded/testable environment"
              - "Instructions are sufficient for a fresh operator to execute the core flow"

            validation:
              - "Collection aligns with current endpoints and auth expectations"
              - "Quickstart steps work against seeded environment"
              - "No stale or broken tester docs remain for the main journey"

            validation_commands:
              - "test -f plans/30_day_repo_blitz_index.md"
              - ".venv/bin/pytest -q tests -k 'docs or collection or quickstart'"
              - "make fg-fast"

      - id: "11.0"
        name: "Error Quality"

        tasks:
          - id: "11.1"
            title: "Explicit actionable errors in primary flows"
            status: "pending"
            depends_on: ["10.2"]

            definition_of_done:
              - "Primary user-facing flows return explicit, actionable errors"
              - "Errors distinguish auth, validation, not-found, and internal-failure classes"
              - "No vague 500-only or generic opaque failures remain on primary paths"
              - "Error payloads are consistent enough for operators and customers to act on"

            validation:
              - "Primary failure modes produce explicit actionable responses"
              - "Error class and message are stable on intended primary paths"
              - "Fast lane remains green"

            validation_commands:
              - ".venv/bin/pytest -q tests -k 'error or explicit or failure'"
              - "make fg-fast"
              - "bash codex_gates.sh"

      - id: "12.0"
        name: "Access Control"

        tasks:
          - id: "12.1"
            title: "Customer access control via API key or equivalent tenant-scoped credential"
            status: "pending"
            depends_on: ["11.1"]

            definition_of_done:
              - "Customer access is gated by a tenant-scoped credential path"
              - "Credential issuance, storage, validation, and revocation are explicit"
              - "Credential use is auditable and does not bypass gateway/tenant controls"
              - "Unauthorized or revoked credentials are rejected explicitly"

            validation:
              - "Authorized credential path succeeds"
              - "Missing/invalid/revoked credential path fails explicitly"
              - "Tenant-scoped isolation is preserved"
              - "Fast lane remains green"

            validation_commands:
              - ".venv/bin/pytest -q tests -k 'api key or credential or access control'"
              - "make fg-fast"
              - "bash codex_gates.sh"

          - id: "12.2"
            title: "Per-tenant usage attribution"
            status: "pending"
            depends_on: ["12.1"]

            definition_of_done:
              - "Usage can be attributed per tenant/customer on the intended monetization path"
              - "Usage events are auditable and tied to the correct tenant"
              - "Usage tracking does not double-count or silently drop primary events"
              - "Usage records are queryable enough to support billing/reporting"

            validation:
              - "Primary customer actions emit usage signal for correct tenant"
              - "Cross-tenant attribution does not occur"
              - "Fast lane remains green"

            validation_commands:
              - ".venv/bin/pytest -q tests -k 'usage or billing or tenant attribution'"
              - "make fg-fast"
              - "bash codex_gates.sh"

      - id: "13.0"
        name: "Billing"

        tasks:
          - id: "13.1"
            title: "Minimal billing integration"
            status: "pending"
            depends_on: ["12.2"]

            definition_of_done:
              - "A minimal supported billing path exists for the first monetization model"
              - "Billing integration is tenant-aware and tied to usage/access control"
              - "Failure modes are explicit and auditable"
              - "No silent billing side effects occur"

            validation:
              - "Billing integration path is testable end-to-end in supported mode"
              - "Billing state aligns with usage and tenant attribution"
              - "Failure path is explicit"
              - "Fast lane remains green"

            validation_commands:
              - ".venv/bin/pytest -q tests -k 'billing or stripe or payment'"
              - "make fg-fast"
              - "bash codex_gates.sh"

      - id: "14.0"
        name: "Feedback"

        tasks:
          - id: "14.1"
            title: "High-value user behavior logging"
            status: "pending"
            depends_on: ["13.1"]

            definition_of_done:
              - "High-value customer actions and failures produce useful product signals"
              - "Signals are attributable to tenant/customer without leaking secrets"
              - "Behavior logging is structured, queryable, and aligned with monetization paths"
              - "Signal volume is high-value, not noisy"

            validation:
              - "Core user journey emits expected behavior signals"
              - "Failures emit actionable product/ops signals"
              - "No sensitive data leakage occurs"
              - "Fast lane remains green"

            validation_commands:
              - ".venv/bin/pytest -q tests -k 'behavior or analytics or feedback'"
              - "make fg-fast"
              - "bash codex_gates.sh"

          - id: "14.2"
            title: "Issue triage workflow"
            status: "pending"
            depends_on: ["14.1"]

            definition_of_done:
              - "Feedback/issues can be categorized and prioritized quickly"
              - "Triage path exists for customer-visible failures and product gaps"

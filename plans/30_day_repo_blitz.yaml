plan_id: frostgate-30-day-repo-blitz
version: 3

phases:
  - id: "phase-1"
    name: "Lock Core Invariants"

    modules:
      - id: "1.0"
        name: "Tenant Isolation"

        tasks:
          - id: "1.1"
            title: "Remove Optional tenant_id"
            status: "pending"
            depends_on: []
            definition_of_done:
              - "No Optional tenant_id in production paths"
            validation:
              - "Optional tenant_id removed from internal enforcement paths targeted by this task"
              - "Known boundary/auth/audit compatibility paths may remain optional"
              - "Fast lane passes"
            validation_commands:
             - "rg -n 'Optional\\[.*tenant_id|tenant_id:\\s*Optional' api/auth_scopes/validation.py api/tenant_usage.py api/middleware/dos_guard.py api/key_rotation.py || true"

          - id: "1.2"
            title: Enforce tenant_id at entry points

            definition_of_done:
              - Unscoped entry points reject missing tenant_id
              - Scoped auth-derived tenant binding still works where intended

            validation:
              - Unscoped requests fail when tenant_id is missing
              - Scoped requests without explicit tenant_id still succeed where auth binding is intended
              - Fast lane passes

            validation_commands:
              - pytest -q tests/test_tenant_binding.py tests/security/test_tenant_contract_endpoints.py || true
              - make fg-fast

            allowed_files:
              - api/admin.py
              - api/control_plane_v2.py
              - api/decisions.py
              - api/dev_events.py
              - api/ingest.py
              - api/keys.py
              - api/stats.py
              - api/ui_dashboards.py
              - tests/**

            max_files_changed: 20

            forbidden_files:
              - contracts/**
              - schemas/api/openapi.json
              - .github/workflows/**

          - id: "1.3"
            title: "Audit read paths"
            status: "pending"
            depends_on: ["1.2"]
            definition_of_done:
              - "All reads filtered by tenant_id"
            validation:
              - "Cross-tenant read returns empty or not-found"
              - "Fast lane passes"
            validation_commands:
              - "pytest -q tests/security -k 'tenant and read' || true"
              - "make fg-fast"

          - id: "1.4"
            title: "Audit export paths"
            status: "pending"
            depends_on: ["1.3"]
            definition_of_done:
              - "Exports enforce tenant boundaries"
            validation:
              - "Cannot export other tenant data"
              - "Fast lane passes"
            validation_commands:
              - "pytest -q tests/security -k 'tenant and export' || true"
              - "make fg-fast"

          - id: "1.5"
            title: "Background job isolation"
            status: "pending"
            depends_on: ["1.4"]
            definition_of_done:
              - "Jobs require tenant_id"
            validation:
              - "Job fails without tenant_id"
              - "Fast lane passes"
            validation_commands:
              - "pytest -q tests -k 'tenant and job' || true"
              - "make fg-fast"

      - id: "2.0"
        name: "Auth Boundary"

        tasks:
          - id: "2.1"
            title: "Remove human auth from core"
            status: "pending"
            depends_on: ["1.5"]
            definition_of_done:
              - "Core does not accept human/browser auth flows"
            validation:
              - "Direct human-auth path to core is rejected"
              - "Fast lane passes"
            validation_commands:
              - "pytest -q tests -k 'auth and core' || true"
              - "make fg-fast"

          - id: "2.2"
            title: "Enforce gateway-only access"
            status: "pending"
            depends_on: ["2.1"]
            definition_of_done:
              - "Human access goes through gateway only"
            validation:
              - "Gateway path works and direct core path is rejected"
              - "Fast lane passes"
            validation_commands:
              - "pytest -q tests -k 'gateway and auth' || true"
              - "make fg-fast"

      - id: "3.0"
        name: "CI Stability"

        tasks:
          - id: "3.1"
            title: "Fix import paths"
            status: "pending"
            depends_on: ["2.2"]
            definition_of_done:
              - "Repo commands run from clean shell without import path failures"
            validation:
              - "Harness and tests run without ModuleNotFoundError"
            validation_commands:
              - "python tools/plan/taskctl.py status"
              - "make fg-fast"

          - id: "3.2"
            title: "Remove flaky tests"
            status: "pending"
            depends_on: ["3.1"]
            definition_of_done:
              - "Fast lane is deterministic across repeated runs"
            validation:
              - "Repeated fast-lane runs produce identical pass/fail behavior"
            validation_commands:
              - "make fg-fast"
              - "make fg-fast"

          - id: "3.3"
            title: "Lock fg-fast"
            status: "pending"
            depends_on: ["3.2"]
            definition_of_done:
              - "fg-fast is the trusted local confidence lane"
            validation:
              - "fg-fast passes cleanly and predictably"
            validation_commands:
              - "make fg-fast"

      - id: "4.0"
        name: "Production Validation"

        tasks:
          - id: "4.1"
            title: "Enforce required env vars"
            status: "pending"
            depends_on: ["3.3"]
            definition_of_done:
              - "Startup fails when required production env vars are missing"
              - "Required production env vars are defined in one authoritative place"
              - "CI and runtime startup use the same source of truth"
            validation:
              - "Production validation checks fail closed"
              - "Prod-like startup fails when required env vars are missing"
              - "Prod-like startup succeeds when required env vars are present"
            validation_commands:
              - "python tools/ci/check_required_env.py"
              - "env FG_ENV=production python tools/ci/check_required_env.py || true"
              - "env FG_ENV=production DATABASE_URL=postgresql://example FG_SIGNING_SECRET=test-signing-secret FG_INTERNAL_AUTH_SECRET=test-internal-secret python tools/ci/check_required_env.py"
              - ".venv/bin/pytest -q tests -k 'required_env or prod_startup or startup_config'"
              - "make fg-fast"

          - id: "4.2"
            title: "Remove silent defaults"
            status: "pending"
            depends_on: ["4.1"]

            definition_of_done:
              - "Production does not silently supply critical defaults"
              - "Critical production secrets/config must be explicitly provided"
              - "Compose/runtime paths do not hide missing critical config with fallback defaults"

            validation:
              - "Missing critical config causes explicit failure"
              - "Blank critical config causes explicit failure"
              - "Prod-like startup/compose path does not silently backfill critical defaults"
              - "Fast lane passes"

            validation_commands:
              - "! env FG_ENV=production python tools/ci/check_required_env.py"
              - pytest -q tests -k "required_env or prod_startup or startup_config or silent_default"
              - docker compose --env-file .env.ci -f docker-compose.yml -f docker-compose.lockdown.yml config >/tmp/fg.compose.rendered.yml
              - "! rg -n 'FG_API_KEY:.*:-|FG_WEBHOOK_SECRET:.*:-|FG_SIGNING_SECRET:.*:-|FG_INTERNAL_AUTH_SECRET:.*:-|DATABASE_URL:.*:-' docker-compose.yml docker-compose.lockdown.yml"
              - make fg-fast

          - id: "5.1"
            title: "Docker compose cleanup"
            status: "pending"
            depends_on: ["4.2"]

            definition_of_done:
              - "Compose stack is reproducible and boots expected core services"
              - "Core profile renders and starts with explicit required config"
              - "Bootstrap and migration steps complete successfully"
              - "frostgate-core reaches healthy status under the CI-like compose path"

            validation:
              - "Compose config renders cleanly with the CI env file"
              - "Core profile can be torn down and brought back up reproducibly"
              - "Bootstrap exits successfully"
              - "Migration exits successfully"
              - "frostgate-core reaches healthy status"
              - "Compose service state is stable after startup"

            validation_commands:
              - "docker compose --env-file .env.ci --profile core -f docker-compose.yml -f docker-compose.lockdown.yml config >/tmp/fg.compose.rendered.yml"
              - "docker compose --env-file .env.ci --profile core down -v"
              - "docker compose --env-file .env.ci --profile core up -d --build"
              - "timeout 120 sh -c 'until docker ps --filter name=fg-core-frostgate-core-1 --filter health=healthy --format \"{{.Names}}\" | grep -q frostgate-core; do sleep 3; done'"
              - "docker compose --env-file .env.ci --profile core ps >/tmp/fg.compose.ps.txt"
              - "docker compose --env-file .env.ci --profile core logs frostgate-migrate --tail=200 >/tmp/fg.migrate.log"
              - "docker compose --env-file .env.ci --profile core logs frostgate-core --tail=200 >/tmp/fg.core.log"
              - "docker inspect $(docker compose --env-file .env.ci --profile core ps -qa frostgate-migrate) --format '{{.State.ExitCode}}' >/tmp/fg.migrate.exit"
              - "docker inspect $(docker compose --env-file .env.ci --profile core ps -q frostgate-core) --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' >/tmp/fg.core.health"
              - "test \"$(cat /tmp/fg.migrate.exit)\" = \"0\""
              - "test \"$(cat /tmp/fg.core.health)\" = \"healthy\""

      - id: "6.0"
        name: "Auth Flow"

        tasks:
          - id: "6.1"
            title: "Keycloak integration"
            status: "pending"
            depends_on: ["5.1"]

            definition_of_done:
              - "Keycloak realm/client integration is wired correctly"
              - "OIDC discovery is reachable through the intended runtime path"
              - "Configured client can obtain a valid token from Keycloak"
              - "Gateway/runtime wiring fails explicitly when OIDC config is missing or invalid"

            validation:
              - "OIDC discovery endpoint returns valid metadata"
              - "Token path is functional for the configured client"
              - "Auth configuration is present and wired to the intended realm/client"
              - "Broken or missing OIDC config causes explicit failure"
              - "Fast lane passes"

            validation_commands:
              - "curl -fsS http://fg-idp.local:8081/realms/FrostGate/.well-known/openid-configuration >/tmp/fg.oidc.discovery.json"
              - "python - <<'PY'\nimport json\np='/tmp/fg.oidc.discovery.json'\nd=json.load(open(p))\nrequired=['issuer','token_endpoint','jwks_uri','authorization_endpoint']\nmissing=[k for k in required if not d.get(k)]\nassert not missing, f'Missing discovery keys: {missing}'\nassert '/realms/FrostGate' in d['issuer'], d['issuer']\nprint('OIDC discovery metadata OK')\nPY"
              - "python - <<'PY'\nimport os, sys\nrequired=['FG_KEYCLOAK_BASE_URL','FG_KEYCLOAK_REALM','FG_KEYCLOAK_CLIENT_ID']\nmissing=[k for k in required if not os.getenv(k)]\nif missing:\n    print(f'Missing required OIDC env: {missing}')\n    sys.exit(1)\nprint('OIDC env wiring OK')\nPY"
              - "curl -fsS -X POST 'http://fg-idp.local:8081/realms/FrostGate/protocol/openid-connect/token' -H 'Content-Type: application/x-www-form-urlencoded' --data-urlencode 'grant_type=client_credentials' --data-urlencode 'client_id=${FG_KEYCLOAK_CLIENT_ID}' --data-urlencode 'client_secret=${FG_KEYCLOAK_CLIENT_SECRET}' >/tmp/fg.oidc.token.json"
              - "python - <<'PY'\nimport json\np='/tmp/fg.oidc.token.json'\nd=json.load(open(p))\nassert d.get('access_token'), 'missing access_token'\nassert d.get('token_type','').lower() == 'bearer', d.get('token_type')\nprint('Keycloak token issuance OK')\nPY"
              - ".venv/bin/pytest -q tests -k 'keycloak or oidc or auth_flow'"
              - "! env -u FG_KEYCLOAK_CLIENT_ID -u FG_KEYCLOAK_CLIENT_SECRET .venv/bin/python - <<'PY'\nimport os, sys\nrequired=['FG_KEYCLOAK_CLIENT_ID','FG_KEYCLOAK_CLIENT_SECRET']\nmissing=[k for k in required if not os.getenv(k)]\nif missing:\n    sys.exit(1)\nsys.exit(0)\nPY"
              - "make fg-fast"

          - id: "6.2"
            title: "End-to-end auth"
            status: "pending"
            depends_on: ["6.1"]
            definition_of_done:
              - "Login through gateway to core works end-to-end"
            validation:
              - "Auth smoke path succeeds"
            validation_commands:
              - "make fg-fast || true"

      - id: "7.0"
        name: "Observability"

        tasks:
          - id: "7.1"
            title: "Structured logging"
            status: "pending"
            depends_on: ["6.2"]
            definition_of_done:
              - "Logs are structured and include request context"
            validation:
              - "Structured log output present for primary flows"
            validation_commands:
              - "make fg-fast"

          - id: "7.2"
            title: "Request tracing"
            status: "pending"
            depends_on: ["7.1"]
            definition_of_done:
              - "request_id propagates across services"
            validation:
              - "Logs show trace continuity across the main request path"
            validation_commands:
              - "make fg-fast"

      - id: "8.0"
        name: "Health"

        tasks:
          - id: "8.1"
            title: "Health endpoints"
            status: "pending"
            depends_on: ["7.2"]
            definition_of_done:
              - "Health routes are unique and correctly wired"
            validation:
              - "Route inventory and health checks pass"
            validation_commands:
              - "make fg-fast"

  - id: "phase-3"
    name: "Testability"

    modules:
      - id: "9.0"
        name: "Core Flows"

        tasks:
          - id: "9.1"
            title: "Create tenant"
            status: "pending"
            depends_on: ["8.1"]
            definition_of_done:
              - "Tester can create a tenant through supported API path"
            validation:
              - "Happy-path tenant creation works"
            validation_commands:
              - "make fg-fast || true"

          - id: "9.2"
            title: "Run audit"
            status: "pending"
            depends_on: ["9.1"]
            definition_of_done:
              - "Tester can trigger the chosen core flow"
            validation:
              - "Core flow completes successfully"
            validation_commands:
              - "make fg-fast || true"

          - id: "9.3"
            title: "Export result"
            status: "pending"
            depends_on: ["9.2"]
            definition_of_done:
              - "Tester can retrieve or export result without manual intervention"
            validation:
              - "End-to-end tester flow succeeds"
            validation_commands:
              - "make fg-fast || true"

      - id: "10.0"
        name: "Tester Kit"

        tasks:
          - id: "10.1"
            title: "Seed script"
            status: "pending"
            depends_on: ["9.3"]
            definition_of_done:
              - "Fresh environment can be seeded repeatably"
            validation:
              - "Seed path runs on clean environment"
            validation_commands:
              - "make fg-fast || true"

          - id: "10.2"
            title: "Postman collection"
            status: "pending"
            depends_on: ["10.1"]
            definition_of_done:
              - "Tester has a usable request collection and quickstart path"
            validation:
              - "Collection aligns with live endpoints"
            validation_commands:
              - "make fg-fast || true"

      - id: "11.0"
        name: "Error Quality"

        tasks:
          - id: "11.1"
            title: "Explicit errors"
            status: "pending"
            depends_on: ["10.2"]
            definition_of_done:
              - "Primary user-facing flows return explicit actionable errors"
            validation:
              - "Primary failure modes are no longer vague"
            validation_commands:
              - "make fg-fast"

  - id: "phase-4"
    name: "Monetization"

    modules:
      - id: "12.0"
        name: "Access Control"

        tasks:
          - id: "12.1"
            title: "API keys"
            status: "pending"
            depends_on: ["11.1"]
            definition_of_done:
              - "Customer access can be gated with API-key or equivalent tenant-scoped control"
            validation:
              - "Access enforcement works for intended path"
            validation_commands:
              - "make fg-fast || true"

          - id: "12.2"
            title: "Usage tracking"
            status: "pending"
            depends_on: ["12.1"]
            definition_of_done:
              - "Basic usage can be attributed per tenant/customer"
            validation:
              - "Usage signal exists in intended logs or storage"
            validation_commands:
              - "make fg-fast || true"

      - id: "13.0"
        name: "Billing"

        tasks:
          - id: "13.1"
            title: "Stripe integration"
            status: "pending"
            depends_on: ["12.2"]
            definition_of_done:
              - "First monetization path exists with minimal billing complexity"
            validation:
              - "Billing integration path is testable"
            validation_commands:
              - "make fg-fast || true"

      - id: "14.0"
        name: "Feedback"

        tasks:
          - id: "14.1"
            title: "User behavior logging"
            status: "pending"
            depends_on: ["13.1"]
            definition_of_done:
              - "High-value user actions and failures are visible"
            validation:
              - "Core user journey produces useful signals"
            validation_commands:
              - "make fg-fast || true"

          - id: "14.2"
            title: "Issue triage"
            status: "pending"
            depends_on: ["14.1"]
            definition_of_done:
              - "Feedback can be categorized and prioritized fast"
            validation:
              - "Triage process exists and is usable"
            validation_commands:
              - "test -f plans/30_day_repo_blitz_index.md"
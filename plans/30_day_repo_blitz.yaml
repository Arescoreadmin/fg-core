plan_id: frostgate-30-day-repo-blitz
version: 4
phases:
- id: phase-1
  name: Lock Core Invariants
  modules:
  - id: '1.0'
    name: Tenant Isolation
    tasks:
    - id: '1.1'
      title: Remove Optional tenant_id
      status: pending
      depends_on: []
      definition_of_done:
      - No Optional tenant_id in production paths
      validation:
      - Optional tenant_id removed from targeted production paths
      - Fast lane passes
      validation_commands:
      - rg -n 'Optional\[.*tenant_id|tenant_id:\s*Optional' api/auth_scopes/validation.py api/tenant_usage.py api/middleware/dos_guard.py
        api/key_rotation.py
      - make fg-fast
    - id: '1.2'
      title: Enforce tenant_id at entry points
      status: pending
      depends_on:
      - '1.1'
      definition_of_done:
      - Unscoped entry points reject missing tenant_id
      - Scoped auth-derived tenant binding still works where intended
      validation:
      - Unscoped requests fail without tenant_id
      - Scoped requests still succeed where auth binding is intended
      - Fast lane passes
      validation_commands:
      - .venv/bin/pytest -q tests/test_tenant_binding.py tests/security/test_tenant_contract_endpoints.py
      - make fg-fast
    - id: '1.3'
      title: Audit read paths
      status: pending
      depends_on:
      - '1.2'
      definition_of_done:
      - All reads filtered by tenant_id
      validation:
      - Cross-tenant read returns empty or not-found
      - Fast lane passes
      validation_commands:
      - .venv/bin/pytest -q tests/security -k 'tenant and read'
      - make fg-fast
    - id: '1.4'
      title: Audit export paths
      status: pending
      depends_on:
      - '1.3'
      definition_of_done:
      - Exports enforce tenant boundaries
      validation:
      - Cannot export other tenant data
      - Fast lane passes
      validation_commands:
      - .venv/bin/pytest -q tests/security -k 'tenant and export'
      - make fg-fast
    - id: '1.5'
      title: Background job isolation
      status: pending
      depends_on:
      - '1.4'
      definition_of_done:
      - Jobs require tenant_id
      validation:
      - Job fails without tenant_id
      - Fast lane passes
      validation_commands:
      - .venv/bin/pytest -q tests -k 'tenant and job'
      - make fg-fast
  - id: '2.0'
    name: Auth Boundary
    tasks:
    - id: '2.1'
      title: Remove human auth from core
      status: pending
      depends_on:
      - '1.5'
      definition_of_done:
      - Core does not accept human/browser auth flows
      validation:
      - Direct human-auth path to core is rejected
      - Fast lane passes
      validation_commands:
      - .venv/bin/pytest -q tests -k 'auth and core'
      - make fg-fast
    - id: '2.2'
      title: Enforce gateway-only access
      status: pending
      depends_on:
      - '2.1'
      definition_of_done:
      - Human access goes through gateway only
      validation:
      - Gateway path works and direct core path is rejected
      - Fast lane passes
      validation_commands:
      - .venv/bin/pytest -q tests -k 'gateway and auth'
      - make fg-fast
  - id: '3.0'
    name: CI Stability
    tasks:
    - id: '3.1'
      title: Fix import paths
      status: pending
      depends_on:
      - '2.2'
      definition_of_done:
      - Repo commands run from clean shell without import path failures
      validation:
      - Harness and tests run without ModuleNotFoundError
      validation_commands:
      - python tools/plan/taskctl.py status
      - make fg-fast
    - id: '3.2'
      title: Remove flaky tests
      status: pending
      depends_on:
      - '3.1'
      definition_of_done:
      - Fast lane is deterministic across repeated runs
      validation:
      - Repeated fast-lane runs produce identical pass/fail behavior
      validation_commands:
      - make fg-fast
      - make fg-fast
      - git diff --exit-code
    - id: '3.3'
      title: Lock fg-fast
      status: pending
      depends_on:
      - '3.2'
      definition_of_done:
      - fg-fast is the trusted local confidence lane
      validation:
      - fg-fast passes cleanly and predictably
      validation_commands:
      - make fg-fast
  - id: '4.0'
    name: Production Validation
    tasks:
    - id: '4.1'
      title: Enforce required env vars
      status: pending
      depends_on:
      - '3.3'
      definition_of_done:
      - Startup fails when required production env vars are missing
      - Required production env vars are defined in one authoritative place
      - CI and runtime startup use the same source of truth
      validation:
      - Production validation checks fail closed
      - Prod-like startup fails when required env vars are missing
      - Prod-like startup succeeds when required env vars are present
      validation_commands:
      - python tools/ci/check_required_env.py
      - env FG_ENV=production python tools/ci/check_required_env.py || true
      - env FG_ENV=production DATABASE_URL=postgresql://example FG_SIGNING_SECRET=test-signing-secret FG_INTERNAL_AUTH_SECRET=test-internal-secret
        python tools/ci/check_required_env.py
      - .venv/bin/pytest -q tests -k 'required_env or prod_startup or startup_config'
      - make fg-fast
    - id: '4.2'
      title: Remove silent defaults
      status: pending
      depends_on:
      - '4.1'
      definition_of_done:
      - Production does not silently supply critical defaults
      - Critical production secrets/config must be explicitly provided
      - Compose/runtime paths do not hide missing critical config with fallback defaults
      validation:
      - Missing critical config causes explicit failure
      - Blank critical config causes explicit failure
      - Prod-like startup/compose path does not silently backfill critical defaults
      - Fast lane passes
      validation_commands:
      - '! env FG_ENV=production python tools/ci/check_required_env.py'
      - .venv/bin/pytest -q tests -k 'required_env or prod_startup or startup_config or silent_default'
      - docker compose --env-file .env.ci -f docker-compose.yml -f docker-compose.lockdown.yml config >/tmp/fg.compose.rendered.yml
      - '! rg -n ''FG_API_KEY:.*:-|FG_WEBHOOK_SECRET:.*:-|FG_SIGNING_SECRET:.*:-|FG_INTERNAL_AUTH_SECRET:.*:-|DATABASE_URL:.*:-''
        docker-compose.yml docker-compose.lockdown.yml'
      - make fg-fast
- id: phase-2
  name: Critical Hardening Gaps
  modules:
  - id: '5.0'
    name: Infrastructure
    tasks:
    - id: '5.1'
      title: Docker compose cleanup
      status: pending
      depends_on:
      - '4.2'
      definition_of_done:
      - Compose stack is reproducible and boots expected core services
      - Core profile renders and starts with explicit required config
      - Bootstrap and migration steps complete successfully
      - frostgate-core reaches healthy status under the CI-like compose path
      validation:
      - Compose config renders cleanly with the CI env file
      - Core profile can be torn down and brought back up reproducibly
      - Bootstrap exits successfully
      - Migration exits successfully
      - frostgate-core reaches healthy status
      - Compose service state is stable after startup
      validation_commands:
      - docker compose --env-file .env.ci --profile core -f docker-compose.yml -f docker-compose.lockdown.yml config >/tmp/fg.compose.rendered.yml
      - docker compose --env-file .env.ci --profile core down -v
      - docker compose --env-file .env.ci --profile core up -d --build
      - timeout 120 sh -c 'until docker inspect $(docker compose --env-file .env.ci --profile core ps -q frostgate-core) --format
        "{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}" | grep -q healthy; do sleep 3; done'
      - docker compose --env-file .env.ci --profile core ps >/tmp/fg.compose.ps.txt
      - docker compose --env-file .env.ci --profile core logs frostgate-migrate --tail=200 >/tmp/fg.migrate.log
      - docker compose --env-file .env.ci --profile core logs frostgate-core --tail=200 >/tmp/fg.core.log
      - docker inspect $(docker compose --env-file .env.ci --profile core ps -qa frostgate-migrate) --format '{{.State.ExitCode}}'
        >/tmp/fg.migrate.exit
      - docker inspect $(docker compose --env-file .env.ci --profile core ps -q frostgate-core) --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}'
        >/tmp/fg.core.health
      - test "$(cat /tmp/fg.migrate.exit)" = "0"
      - test "$(cat /tmp/fg.core.health)" = "healthy"
    - id: '5.2'
      title: Service networking and boundary hardening
      status: pending
      depends_on:
      - '5.1'
      definition_of_done:
      - Core services resolve each other by intended network identities only
      - No hidden localhost-only coupling remains in compose/runtime paths
      - Service-to-service URLs are explicit and environment-correct
      - Production paths fail closed instead of silently falling back to localhost
      - Dev-only localhost fallbacks remain explicit and gated
      - Direct external exposure of core is removed where unsupported
      - Gateway/plane is the only supported human-access path
      - FG_DEV_AUTH_BYPASS is absent from non-dev paths
      - Loopback/localhost fallback is rejected outside dev
      validation:
      - Compose networking is explicit and reproducible
      - Cross-service resolution works through intended network aliases
      - No localhost-only runtime dependency remains in supported stack
      - Production startup validation rejects localhost/loopback runtime URLs
      - Compose smoke test proves direct external core access is blocked
      - Prod-like config asserts FG_DEV_AUTH_BYPASS is absent
      - Non-dev runtime rejects loopback fallback URLs
      - Fast lane remains green
      validation_commands:
      - docker compose --env-file .env.ci --profile core config >/tmp/fg.compose.network.yml
      - .venv/bin/pytest -q tests -k 'network or compose or service_resolution'
      - .venv/bin/pytest -q tests -k 'startup or ingest_bus or nats or ratelimit or rate_limit or agent'
      - .venv/bin/pytest -q tests -k 'plane_boundary or boundary or direct_core_access or gateway_only'
      - '! rg -n ''FG_DEV_AUTH_BYPASS\s*=|FG_DEV_AUTH_BYPASS:'' docker-compose*.yml .env*'
      - .venv/bin/pytest -q tests -k 'loopback or localhost and non_dev'
      - make fg-fast
      - bash codex_gates.sh
    - id: '5.3'
      title: Plane boundary enforcement
      status: pending
      depends_on:
      - '5.2'
      definition_of_done:
      - Gateway/plane boundary is the only supported ingress for human-initiated access
      - Direct core ingress is blocked on unsupported surfaces
      - Service identities and network policies enforce intended paths only
      validation:
      - Direct core access attempt is blocked in compose smoke scenario
      - Gateway path remains functional for supported user journey
      - Plane boundary check script and fast lane remain green
      validation_commands:
      - .venv/bin/pytest -q tests -k 'plane_boundary or gateway_only or direct_core_blocked'
      - python tools/ci/check_plane_boundaries.py
      - make fg-fast
  - id: '6.0'
    name: Auth Flow
    tasks:
    - id: '6.1'
      title: Keycloak integration
      status: pending
      depends_on:
      - '5.3'
      definition_of_done:
      - Keycloak realm/client integration is wired correctly
      - OIDC discovery is reachable through the intended runtime path
      - Configured client can obtain a valid token from Keycloak
      - Gateway/runtime wiring fails explicitly when OIDC config is missing or invalid
      validation:
      - OIDC discovery endpoint returns valid metadata
      - Token path is functional for the configured client
      - Auth configuration is present and wired to the intended realm/client
      - Broken or missing OIDC config causes explicit failure
      - Fast lane passes
      validation_commands:
      - make fg-idp-validate
      - .venv/bin/pytest -q tests -k 'keycloak or oidc or auth_flow'
      - make fg-fast
    - id: '6.2'
      title: End-to-end auth flow
      status: pending
      depends_on:
      - '6.1'
      definition_of_done:
      - A Keycloak-issued token for the configured realm/client is accepted on the intended gateway entry path
      - Gateway-authenticated requests reach protected core functionality without local bypasses or alternate trust paths
      - JWT validation enforces issuer, audience, signature, and expiry
      - Authorization enforces required scopes and tenant isolation on protected routes
      - Misconfigured OIDC discovery, JWKS, issuer, audience, or client wiring fails explicitly
      validation:
      - Valid token request to a protected endpoint returns success
      - Request without token returns 401 or repository-defined equivalent
      - Request with tampered token returns 401 or repository-defined equivalent
      - Request with wrong issuer or audience returns 401 or repository-defined equivalent
      - Request with valid token but insufficient scope returns 403 or repository-defined equivalent
      - Request with valid token for the wrong tenant is denied
      - OIDC/JWKS misconfiguration fails closed and does not fall back silently
      - Fast lane and codex gates remain green
      validation_commands:
      - make fg-idp-validate
      - .venv/bin/pytest -q tests -k 'auth_flow or keycloak or oidc or jwt'
      - .venv/bin/pytest -q tests/security -k 'tenant or scope or auth'
      - make fg-fast
      - bash codex_gates.sh
    - id: '6.3'
      title: OIDC hardening and key rotation
      status: pending
      depends_on:
      - '6.2'
      definition_of_done:
      - OIDC is required in staging and production-like environments
      - JWKS cache TTL and refresh behavior are explicit and tested
      - Stale or rotated key mismatch fails explicitly
      - Stable session secret is required outside dev
      validation:
      - Key rotation refresh path succeeds without unsafe fallback
      - Staging config fails closed when OIDC settings are missing
      - Restart preserves intended auth behavior and failure modes
      validation_commands:
      - .venv/bin/pytest -q tests -k 'oidc_key_rotation or jwks_cache'
      - .venv/bin/pytest -q tests -k 'staging_oidc_required_env'
      - .venv/bin/pytest -q tests -k 'session_secret_required'
      - make fg-fast
  - id: '7.0'
    name: Observability
    tasks:
    - id: '7.1'
      title: Structured logging (enforced, auditable)
      status: pending
      depends_on:
      - '6.2'
      definition_of_done:
      - All request-handling and security-relevant logs are structured JSON
      - Every log entry includes request_id, timestamp, service, level, event
      - Authenticated request logs include tenant_id and subject where available
      - Security events are explicitly logged
      - No plaintext/unstructured logging remains in request-handling paths
      - Logging does not leak secrets
      validation:
      - Authenticated request logs include request_id, tenant_id, and subject
      - Auth failures and authorization denials are explicit
      - Structured logs parse as JSON
      - No sensitive values appear in logs
      - Fast lane and codex gates remain green
      validation_commands:
      - .venv/bin/pytest -q tests -k 'logging or auth or security'
      - .venv/bin/pytest -q admin_gateway/tests/test_structured_logging_task71.py
      - make fg-fast
      - bash codex_gates.sh
    - id: '7.2'
      title: End-to-end request tracing (propagation + integrity)
      status: pending
      depends_on:
      - '7.1'
      definition_of_done:
      - Every inbound request is assigned a request_id if missing
      - Malformed inbound request_id values are rejected/replaced
      - request_id propagates across internal request boundaries
      - request_id cannot be overridden or dropped mid-flow
      validation:
      - One request produces logs across gateway and core with same request_id
      - Malformed request_id is replaced safely
      - Failure-path logs contain request_id
      - Fast lane and codex gates remain green
      validation_commands:
      - .venv/bin/pytest -q tests -k 'trace or request_id or propagation'
      - .venv/bin/pytest -q tests/security -k 'logging or trace or context'
      - .venv/bin/pytest -q admin_gateway/tests/test_request_tracing_task72.py tests/test_request_tracing_task72.py
      - make fg-fast
      - bash codex_gates.sh
    - id: '7.3'
      title: Distributed request tracing across async boundaries
      status: pending
      depends_on:
      - '7.2'
      definition_of_done:
      - Parent request_id propagates into async job boundaries
      - Message metadata carries request_id where broker paths exist
      - Worker/job execution restores canonical request_id from parent context
      - Tracing across async boundaries does not introduce spoofing or tenant confusion
      validation:
      - Parent request_id is preserved across async jobs
      - Job logs contain originating request_id
      - Invalid trace metadata is rejected/replaced safely
      - Fast lane and codex gates remain green
      validation_commands:
      - .venv/bin/pytest -q tests -k 'trace or request_id or propagation or async or worker'
      - .venv/bin/pytest -q tests/test_request_propagation_task73.py tests/test_request_tracing_task72.py tests/test_job_logging_idempotency.py
      - .venv/bin/pytest -q tests/security -k 'trace or context or propagation'
      - make fg-fast
      - bash codex_gates.sh
  - id: '8.0'
    name: Health
    tasks:
    - id: '8.1'
      title: Health endpoints (truthful, unique, dependency-aware)
      status: pending
      depends_on:
      - '7.3'
      definition_of_done:
      - Health/readiness/startup endpoints are unique, documented, and correctly wired
      - Health endpoints reflect actual dependency state
      - Readiness fails when critical dependencies are unavailable
      - Liveness remains lightweight
      - Health endpoints do not expose sensitive internal state
      validation:
      - Health endpoints return expected status codes and payloads
      - Dependency failure changes readiness behavior correctly
      - No duplicate/conflicting health routes remain
      - Route inventory and fast lane remain green
      validation_commands:
      - .venv/bin/pytest -q tests -k 'health or readiness or startup'
      - .venv/bin/pytest -q admin_gateway/tests/test_health.py
      - make fg-fast
      - bash codex_gates.sh
  - id: '15.0'
    name: Plan Integrity
    tasks:
    - id: '15.1'
      title: Plan/state integrity gate
      status: pending
      depends_on:
      - '6.3'
      definition_of_done:
      - Plan YAML, state YAML, and index cannot drift silently
      - Current task, completed tasks, and dependency graph resolve consistently
      - Plan runner fails explicitly on incoherent state
      - Out-of-order task completion is explained deterministically in resolved state
      - Validation artifacts referenced in state are verified to exist
      validation:
      - taskctl status resolves current task without contradiction
      - Malformed or contradictory state fails explicitly
      - Current task selection is deterministic and truthful
      - Missing validation artifacts fail integrity checks explicitly
      - Fast lane remains green
      validation_commands:
      - python tools/plan/taskctl.py status
      - .venv/bin/pytest -q tests -k 'plan or taskctl or state'
      - python tools/plan/taskctl.py status --explain
      - .venv/bin/pytest -q tests -k 'plan_artifact_existence or deterministic_current_task'
      - make fg-fast
    - id: '15.2'
      title: Non-bypass tester journey enforcement
      status: pending
      depends_on:
      - '14.2'
      definition_of_done:
      - Canonical tester path remains OIDC-based and non-bypass
      - Dev bypass cannot silently re-enter canonical tester flow
      - Validation scripts and docs fail if canonical path drifts
      validation:
      - Canonical tester flow rejects dev-bypass regressions
      - Docs, collection, and runtime validation remain aligned
      - Fast lane remains green
      validation_commands:
      - .venv/bin/pytest -q tests/test_tester_quickstart_alignment.py
      - bash tools/auth/validate_tester_flow.sh || true
      - make fg-fast
    - id: '15.3'
      title: Runtime verification classification
      status: pending
      depends_on:
      - '15.2'
      definition_of_done:
      - Repo clearly distinguishes structural validation, live runtime proof, and environment-blocked checks
      - No task is marked complete based on a skipped runtime proof without explicit classification
      validation:
      - Validation artifacts record pass vs skip vs blocked clearly
      - Operator workflow distinguishes gate pass from live proof pass
      validation_commands:
      - .venv/bin/pytest -q tests -k 'runtime_proof or validation_classification or skip'
      - make fg-fast
    - id: '15.4'
      title: Readiness fail-closed for enabled dependencies
      status: pending
      depends_on:
      - '15.3'
      definition_of_done:
      - If Redis/NATS/OIDC/other enabled dependencies are configured on, missing connection URLs fail explicitly
      - Dev-only fallbacks remain explicit and environment-gated
      - Production never silently degrades to localhost defaults
      validation:
      - Enabled dependency with missing URL fails closed in non-dev
      - Dev-only fallback behavior remains explicit where intentionally allowed
      validation_commands:
      - .venv/bin/pytest -q tests -k 'startup or dependency or localhost or fail_closed'
      - make fg-fast
- id: phase-3
  name: Testability
  modules:
  - id: '9.0'
    name: Core Flows
    tasks:
    - id: '9.1'
      title: Create tenant through supported product path
      status: pending
      depends_on:
      - '8.1'
      definition_of_done:
      - A tester can create a tenant through intended supported API/gateway path only
      - Tenant creation enforces auth, tenant model invariants, and input validation
      - Created tenant is persisted and observable through supported read path
      - Duplicate create behavior is explicit
      validation:
      - Happy-path tenant creation succeeds
      - Invalid payload fails explicitly
      - Unauthorized tenant creation is rejected
      - Duplicate creation returns explicit conflict behavior
      - Created tenant is retrievable
      - Fast lane remains green
      validation_commands:
      - .venv/bin/pytest -q tests/test_tenant_create.py
      - .venv/bin/pytest -q tests -k 'tenant and create'
      - make fg-fast
      - bash codex_gates.sh
    - id: '9.2'
      title: Run primary audit/control flow
      status: pending
      depends_on:
      - '9.1'
      definition_of_done:
      - Tester can trigger intended core audit/control flow through supported interfaces only
      - Flow enforces auth, tenant isolation, and required preconditions
      - Resulting state/artifacts are persisted and retrievable
      validation:
      - Primary flow completes end-to-end
      - Cross-tenant/unauthorized execution is denied
      - Missing prerequisites fail explicitly
      - Fast lane remains green
      validation_commands:
      - .venv/bin/pytest -q tests/test_audit_cycle_run.py
      - .venv/bin/pytest -q tests -k 'audit and tenant'
      - make fg-fast
      - bash codex_gates.sh
    - id: '9.3'
      title: Retrieve and export resulting artifacts
      status: pending
      depends_on:
      - '9.2'
      definition_of_done:
      - Tester can retrieve/export artifacts through supported surfaces only
      - Retrieval/export paths preserve tenant boundaries and auth checks
      - Export payload shape is stable and usable
      validation:
      - Create -> run -> retrieve/export succeeds through supported interfaces
      - Unauthorized/cross-tenant retrieval/export is denied
      - Missing result returns explicit not-found
      - Fast lane remains green
      validation_commands:
      - .venv/bin/pytest -q tests/test_audit_exam_api.py
      - .venv/bin/pytest -q tests/test_audit_cycle_run.py
      - .venv/bin/pytest -q tests/security -k 'export or tenant'
      - make fg-fast
      - bash codex_gates.sh
  - id: '10.0'
    name: Tester Kit
    tasks:
    - id: '10.1'
      title: Repeatable seed/bootstrap script
      status: pending
      depends_on:
      - '9.3'
      definition_of_done:
      - Fresh environment can be seeded repeatably through one supported command
      - Seed path is idempotent or fails explicitly when rerun
      - Seeded state is sufficient to exercise primary tester flows
      validation:
      - Seed path succeeds cleanly
      - Seed rerun behavior is deterministic
      - Seeded environment supports primary flow smoke test
      - Fast lane remains green
      validation_commands:
      - .venv/bin/pytest -q tests -k 'seed or bootstrap'
      - python tools/seed/run_seed.py
      - python tools/seed/run_seed.py
      - .venv/bin/pytest -q tests/test_audit_cycle_run.py
      - make fg-fast
      - bash codex_gates.sh
    - id: '10.2'
      title: Tester collection and quickstart
      status: pending
      depends_on:
      - '10.1'
      definition_of_done:
      - Tester has one working request collection and one minimal quickstart path
      - Canonical journey uses real OIDC tester user, not dev bypass
      - Canonical journey uses current supported endpoints only
      - Session can access tenant-seed-primary and audit search/export
      - Docs, collection, and validations describe same canonical flow
      validation:
      - Collection aligns with supported endpoints and auth expectations
      - Quickstart works without dev bypass
      - Canonical identity lands in tenant-seed-primary
      - Session accesses /admin/me, /admin/tenants, /admin/audit/search, and /admin/audit/export
      - Fast lane and codex gates remain green
      validation_commands:
      - test -f plans/30_day_repo_blitz_index.md
      - test -f tools/seed/run_seed.py
      - python tools/seed/run_seed.py
      - python tools/seed/run_seed.py
      - .venv/bin/pytest -q tests/test_tester_quickstart_alignment.py
      - .venv/bin/pytest -q tests/test_keycloak_oidc.py
      - .venv/bin/pytest -q tests -k 'seed or bootstrap or api_key'
      - .venv/bin/pytest -q tests -k 'auth or tenant or oidc or token_exchange'
      - .venv/bin/pytest -q admin_gateway/tests -k 'auth or tenant or token or oidc'
      - make fg-idp-validate
      - make fg-fast
      - bash codex_gates.sh
- id: phase-4
  name: Monetization That Supports Product
  modules:
  - id: '12.0'
    name: Access Control
    tasks:
    - id: '12.1'
      title: Customer credential issuance/revoke/rotate with tenant-scoped enforcement
      status: pending

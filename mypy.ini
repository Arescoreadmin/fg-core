[mypy]
explicit_package_bases = True
ignore_missing_imports = True
exclude = site-packages

[mypy-psycopg]
follow_imports = skip

[mypy-psycopg.*]
follow_imports = skip

[mypy-admin_gateway.main]
disable_error_code = arg-type,call-arg

[mypy-tests.test_resilience_guard_determinism]
disable_error_code = arg-type,call-arg

[mypy-tests.security.test_spine_enforcement]
disable_error_code = arg-type,call-arg

[mypy-tests.security.test_exception_shield_middleware]
disable_error_code = arg-type,call-arg
[mypy]
explicit_package_bases = True
ignore_missing_imports = True
exclude = site-packages

[mypy-psycopg]
follow_imports = skip

[mypy-psycopg.*]
follow_imports = skip

[mypy-admin_gateway.main]
disable_error_code = arg-type,call-arg

[mypy-tests.test_resilience_guard_determinism]
disable_error_code = arg-type,call-arg

[mypy-tests.security.test_spine_enforcement]
disable_error_code = arg-type,call-arg

[mypy-tests.security.test_exception_shield_middleware]
disable_error_code = arg-type,call-arg

# Pre-existing mypy issues in backend/infra files — not introduced by 18.6.8a.
# Suppressed here to allow fg-smart to pass; root fixes tracked separately.
[mypy-admin_gateway.routers.products]
disable_error_code = attr-defined

[mypy-api.agent_phase2]
disable_error_code = attr-defined

[mypy-api.control_tower_snapshot]
disable_error_code = type-var

[mypy-api.graceful_shutdown]
disable_error_code = misc

[mypy-jobs.sim_validator.job]
disable_error_code = assignment

[mypy-services.connectors.drift.alerts]
disable_error_code = attr-defined

[mypy-services.connectors.drift.scheduler]
disable_error_code = attr-defined

[mypy-services.connectors.idempotency]
disable_error_code = attr-defined

[mypy-services.connectors.safe_target_validator]
disable_error_code = arg-type

[mypy-services.field_assessment.durable_job_service]
disable_error_code = attr-defined

[mypy-services.field_assessment.trust_intelligence]
disable_error_code = arg-type

[mypy-services.governance_asset_registry.promotion]
disable_error_code = attr-defined

[mypy-services.governance_graph.mutations]
disable_error_code = attr-defined

[mypy-tests.drift.test_alerts]
disable_error_code = var-annotated

[mypy-tests.test_ai_vendor_governance]
disable_error_code = var-annotated

[mypy-tests.test_external_ai_risk_register]
disable_error_code = arg-type,var-annotated
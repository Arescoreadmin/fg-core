apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "frostgate-core.fullname" . }}-config
  labels:
    app.kubernetes.io/name: {{ include "frostgate-core.name" . }}
    helm.sh/chart: {{ include "frostgate-core.chart" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
data:
  {{- $env := default (dict) .Values.env -}}
  {{- if not (kindIs "map" $env) }}
  {{- fail "Values.env must be a map of string:string" }}
  {{- end }}
  {{- range $k, $v := $env }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
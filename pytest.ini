[pytest]
testpaths =
    tests
    backend/tests
norecursedirs =
    .venv
    artifacts
    state

addopts = --strict-markers

# Explicitly set asyncio fixture loop scope (prevents future pytest-asyncio breakage)
asyncio_default_fixture_loop_scope = function

markers =
    smoke: quick sanity checks
    contract: API/UI contract checks
    security: security invariants and auth/security regression tests
    slow: long-running tests excluded from fg-fast
    e2e_http: HTTP e2e tests against a running server
    integration: multi-component or real running server tests
    asyncio: async tests
    postgres: postgres-only tests

# =============================================================================
# Filter Warnings
# =============================================================================
filterwarnings =
    error
    ignore:.*MemoryObjectReceiveStream:pytest.PytestUnraisableExceptionWarning
    ignore:.*BaseConnection.__del__:pytest.PytestUnraisableExceptionWarning
    ignore:Exception ignored in.*socket\.socket.*:pytest.PytestUnraisableExceptionWarning
    ignore:Exception ignored in.*BaseEventLoop\.__del__.*:pytest.PytestUnraisableExceptionWarning
    ignore:Exception ignored in.*_UnixSelectorEventLoop.*:pytest.PytestUnraisableExceptionWarning
services:
  redis:
    profiles: ["core"]
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - internal
    user: "999:999"
    command:
      - redis-server
      - --bind
      - 0.0.0.0
      - --protected-mode
      - "yes"
      - --save
      - ""
      - --appendonly
      - "no"
      - --requirepass
      - ${REDIS_PASSWORD:?set REDIS_PASSWORD in .env}
      - --rename-command
      - FLUSHALL
      - ""
      - --rename-command
      - FLUSHDB
      - ""
      - --rename-command
      - CONFIG
      - ""
      - --rename-command
      - SHUTDOWN
      - ""
      - --rename-command
      - MODULE
      - ""
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:?set REDIS_PASSWORD in .env}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 5s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETGID
      - SETUID
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=32m,mode=700
      - /data:rw,noexec,nosuid,size=128m,uid=999,gid=999,mode=700

  nats:
    profiles: ["core"]
    image: nats:2.10-alpine
    restart: unless-stopped
    networks:
      - internal
    command:
      - -js
      - --auth
      - ${NATS_AUTH_TOKEN:?set NATS_AUTH_TOKEN in .env}
      - -m
      - "8222"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8222/healthz >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 5s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m,mode=700

  postgres:
    profiles: ["core"]
    image: postgres:16-alpine
    restart: unless-stopped
    networks:
      - internal
    env_file:
      - path: .env
        required: false
      - path: env/prod.env
        required: true
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-frostgate}
      POSTGRES_APP_USER: ${POSTGRES_APP_USER:-fg_user}
      POSTGRES_APP_PASSWORD: ${POSTGRES_APP_PASSWORD:-postgres}
      POSTGRES_APP_DB: ${POSTGRES_APP_DB:-frostgate}
      POSTGRES_INITDB_ARGS: --auth-host=scram-sha-256 --auth-local=trust
    volumes:
      - fg_pgdata:/var/lib/postgresql/data
      - ./scripts/postgres/init_roles.sh:/docker-entrypoint-initdb.d/init_roles.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB -h 127.0.0.1 -p 5432"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=128m,mode=700

  opa-bundles:
    profiles: ["core"]
    image: nginx:alpine
    restart: unless-stopped
    entrypoint: ["nginx", "-g", "daemon off;"]
    read_only: true
    user: "0:0"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
      - CHOWN
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=16m,mode=700
      - /var/cache/nginx:rw,noexec,nosuid,size=64m,mode=700
      - /var/run:rw,noexec,nosuid,size=8m,mode=700
    networks:
      - internal
    volumes:
      - ./policy/bundles:/usr/share/nginx/html:ro
      - ./policy/bundles/nginx.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "-T", "2", "-O", "-", "http://127.0.0.1/health"]
      interval: 5s
      timeout: 2s
      retries: 12
      start_period: 5s

  opa:
    profiles: ["core"]
    build:
      context: .
      dockerfile: policy/opa/Dockerfile
    image: frostgate-opa:latest
    restart: unless-stopped
    networks:
      - internal
    depends_on:
      opa-bundles:
        condition: service_healthy
    command:
      - run
      - --server
      - --addr=0.0.0.0:8181
      - --log-level=info
      - --log-format=json
      - --ready-timeout=20
      - --config-file=/config/config.yaml
    volumes:
      - ./policy/opa/config.yaml:/config/config.yaml:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "-T", "2", "-O", "-", "http://127.0.0.1:8181/health?bundle=true"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=32m,mode=700
  frostgate-bootstrap:
    profiles: ["core"]
    image: alpine:3.20
    restart: "no"
    networks:
      - internal
    entrypoint: ["sh", "-lc", "/bootstrap/bootstrap.sh"]
    volumes:
      - ./scripts/bootstrap.sh:/bootstrap/bootstrap.sh:ro
      - fg_mission:/var/lib/frostgate/mission
      - fg_state:/var/lib/frostgate/state
      - fg_agent_queue:/var/lib/frostgate/agent_queue
      - fg_ring_state:/var/lib/frostgate/ring/state
      - fg_ring_models:/var/lib/frostgate/ring/models
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=128m,mode=700
      - /var/lib/frostgate/pycache:rw,noexec,nosuid,size=64m,mode=700

  frostgate-migrate:
    profiles: ["core"]
    build:
      context: .
      dockerfile: Dockerfile
    image: frostgate-core:latest
    env_file:
      - path: .env
        required: false
      - path: env/prod.env
        required: true
    environment:
      FG_DB_BACKEND: ${FG_DB_BACKEND:-postgres}
      FG_DB_URL: postgresql+psycopg://${POSTGRES_APP_USER}:${POSTGRES_APP_PASSWORD}@postgres:5432/${POSTGRES_APP_DB}
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint:
      - sh
      - -lc
      - >
        set -eux;
        python -m api.db_migrations --backend "${FG_DB_BACKEND}" --apply;
        python -m api.db_migrations --backend "${FG_DB_BACKEND}" --assert
    restart: "no"
    read_only: true
    networks:
      - internal
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=32m,mode=700
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  frostgate-core:
    profiles: ["core"]
    build:
      context: .
      dockerfile: Dockerfile
    image: frostgate-core:latest
    command: ["sh", "-lc", "exec uvicorn api.main:app --host 0.0.0.0 --port 8080"]
    restart: unless-stopped
    networks:
      internal:
        aliases:
          - frostgate-core
    init: true
    stop_grace_period: 20s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
      opa-bundles:
        condition: service_healthy
      opa:
        condition: service_healthy
      frostgate-bootstrap:
        condition: service_completed_successfully
      frostgate-migrate:
        condition: service_completed_successfully
    env_file:
      - path: .env
        required: false
      - path: env/prod.env
        required: true
    environment:
      FG_ENV: ${FG_ENV:-prod}
      FG_DEBUG: ${FG_DEBUG:-false}
      FG_LOG_LEVEL: ${FG_LOG_LEVEL:-info}
      FG_DB_BACKEND: ${FG_DB_BACKEND:-postgres}
      FG_DB_URL: postgresql+psycopg://${POSTGRES_APP_USER}:${POSTGRES_APP_PASSWORD}@postgres:5432/${POSTGRES_APP_DB}
      FG_WEBHOOK_SECRET: ${FG_WEBHOOK_SECRET:?set FG_WEBHOOK_SECRET in .env or env/prod.env}
      FG_API_KEY: ${FG_API_KEY:?set FG_API_KEY in .env or env/prod.env}
      FG_REDIS_URL: ${FG_REDIS_URL:-redis://:ci-redis-password@redis:6379/0}
      FG_NATS_URL: ${FG_NATS_URL:-nats://ci-nats-token@nats:4222}
      FG_OPA_URL: ${FG_OPA_URL:-http://opa:8181}
      AG_CORE_BASE_URL: http://frostgate-core:8080
      FG_AUTH_ALLOW_FALLBACK: ${FG_AUTH_ALLOW_FALLBACK:-false}
      FG_RL_FAIL_OPEN: ${FG_RL_FAIL_OPEN:-false}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_APP_USER}:${POSTGRES_APP_PASSWORD}@postgres:5432/${POSTGRES_APP_DB}
      FG_SIGNING_SECRET: ${FG_SIGNING_SECRET:?set FG_SIGNING_SECRET in .env or env/prod.env}
      FG_INTERNAL_AUTH_SECRET: ${FG_INTERNAL_AUTH_SECRET:?set FG_INTERNAL_AUTH_SECRET in .env or env/prod.env}
    volumes:
      - fg_mission:/var/lib/frostgate/mission
      - fg_state:/var/lib/frostgate/state
      - fg_agent_queue:/var/lib/frostgate/agent_queue
      - fg_ring_state:/var/lib/frostgate/ring/state
      - fg_ring_models:/var/lib/frostgate/ring/models
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health/ready', timeout=2).read()\""]
      interval: 5s
      timeout: 2s
      retries: 30
      start_period: 15s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=128m,mode=700
  admin-gateway:
    profiles: ["admin"]
    build:
      context: .
      dockerfile: admin_gateway/Dockerfile
    image: frostgate-admin-gateway:latest
    restart: unless-stopped
    networks:
      - internal
      - public
    init: true
    depends_on:
      frostgate-core:
        condition: service_healthy
    ports:
      - "127.0.0.1:18080:8080"
    env_file:
      - path: .env
        required: false
      - path: env/prod.env
        required: true
    environment:
      AG_CORE_BASE_URL: http://frostgate-core:8080

      # Explicit local/CI-safe auth posture for admin profile until OIDC is wired.
      FG_ENV: local
      FG_AUTH_MODE: dev
      FG_DEBUG: "false"
      FG_LOG_LEVEL: info
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=2).read()\""]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m,mode=700

  # fg-idp — Keycloak identity provider (Task 6.1)
  # Profile: idp — start explicitly with: docker compose --profile idp up -d
  # Requires /etc/hosts entry: 127.0.0.1 fg-idp.local
  fg-idp:
    profiles: ["idp"]
    image: quay.io/keycloak/keycloak:24.0
    command: ["start-dev", "--import-realm"]
    networks:
      internal:
        aliases:
          - fg-idp
      public: {}
    ports:
      - "127.0.0.1:8081:8080"
    volumes:
      - ./keycloak/realms:/opt/keycloak/data/import:ro
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/8080 && printf 'GET /realms/FrostGate HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && head -1 <&3 | grep -q 200"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 60s

  console:
    profiles: ["admin"]
    build:
      context: ./console
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://127.0.0.1:18080
    image: frostgate-console:latest
    restart: unless-stopped
    networks:
      - public
    init: true
    depends_on:
      admin-gateway:
        condition: service_healthy
    ports:
      - "127.0.0.1:13000:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://127.0.0.1:18080
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

volumes:
  fg_pgdata:
  fg_state:
  fg_agent_queue:
  fg_ring_state:
  fg_ring_models:
  fg_mission:

networks:
  public: {}
  internal:
    internal: true
name: frostgate-docker-ci

on:
  pull_request:
    branches: ["main"]
    paths:
      - ".github/workflows/docker-ci.yml"
      - "docker-compose.yml"
      - "docker-compose.lockdown.yml"
      - "Dockerfile"
      - "**/Dockerfile"
      - "admin_gateway/**"
      - "api/**"
      - "console/**"
      - "policy/**"
      - "scripts/**"
      - "requirements.txt"
      - "requirements-dev.txt"
      - "requirements.lock"
      - "requirements-dev.lock"
      - "constraints.txt"
      - ".env.example"
      - "env/**"
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/docker-ci.yml"
      - "docker-compose.yml"
      - "docker-compose.lockdown.yml"
      - "Dockerfile"
      - "**/Dockerfile"
      - "admin_gateway/**"
      - "api/**"
      - "console/**"
      - "policy/**"
      - "scripts/**"
      - "requirements.txt"
      - "requirements-dev.txt"
      - "requirements.lock"
      - "requirements-dev.lock"
      - "constraints.txt"
      - ".env.example"
      - "env/**"
  workflow_dispatch:

concurrency:
  group: frostgate-docker-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  docker-validate:
    name: Docker Compose Validation
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      COMPOSE_DOCKER_CLI_BUILD: "1"
      DOCKER_BUILDKIT: "1"
      COMPOSE_PROFILES: "core,admin"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate CI secrets
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY' >> "$GITHUB_ENV"
          import secrets

          def tok(n: int) -> str:
              return secrets.token_urlsafe(n)

          print(f"FG_API_KEY={tok(32)}")
          print(f"FG_AGENT_API_KEY={tok(24)}")
          print(f"FG_WEBHOOK_SECRET={tok(32)}")
          print(f"FG_ENCRYPTION_KEY={tok(32)}")
          print(f"FG_JWT_SECRET={tok(32)}")
          print(f"FG_SESSION_SECRET={tok(32)}")
          print(f"REDIS_PASSWORD={tok(24)}")
          print(f"POSTGRES_PASSWORD={tok(24)}")
          print(f"NATS_AUTH_TOKEN={tok(24)}")
          PY

      - name: Verify required env vars are set
        shell: bash
        run: |
          set -euo pipefail
          missing=0

          for var in \
            FG_API_KEY \
            FG_AGENT_API_KEY \
            FG_WEBHOOK_SECRET \
            FG_ENCRYPTION_KEY \
            FG_JWT_SECRET \
            FG_SESSION_SECRET \
            REDIS_PASSWORD \
            POSTGRES_PASSWORD \
            NATS_AUTH_TOKEN
          do
            if [ -n "${!var:-}" ]; then
              echo "${var}=set"
            else
              echo "::error::${var} is missing"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            echo "Required env vars missing; aborting."
            exit 1
          fi

      - name: Prepare policy bundle assets
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p policy/bundles

          if [ ! -f policy/bundles/nginx.conf ]; then
            cat > policy/bundles/nginx.conf <<'EOF'
          pid /tmp/nginx.pid;

          events {}

          http {
            client_body_temp_path /tmp/client_body_temp;
            proxy_temp_path       /tmp/proxy_temp;
            fastcgi_temp_path     /tmp/fastcgi_temp;
            uwsgi_temp_path       /tmp/uwsgi_temp;
            scgi_temp_path        /tmp/scgi_temp;

            server {
              listen 80;

              location /health {
                return 200 "ok\n";
              }

              location / {
                root /usr/share/nginx/html;
                try_files $uri =404;
              }
            }
          }
          EOF
          fi

          if [ -f policy/bundles/bundle.tar.gz ]; then
            echo "bundle.tar.gz already present"
          elif [ -f policy/bundles/bundle.bak ]; then
            cp policy/bundles/bundle.bak policy/bundles/bundle.tar.gz
          else
            tmpdir="$(mktemp -d)"
            mkdir -p "$tmpdir/bundle/policy"
            found=0
            while IFS= read -r -d '' f; do
              found=1
              rel="${f#policy/opa/}"
              mkdir -p "$tmpdir/bundle/policy/$(dirname "$rel")"
              cp "$f" "$tmpdir/bundle/policy/$rel"
            done < <(find policy/opa -type f -name '*.rego' -print0)

            if [ "$found" -eq 0 ]; then
              echo "::error::No .rego files found under policy/opa to build a CI bundle"
              exit 1
            fi

            tar -C "$tmpdir/bundle" -czf policy/bundles/bundle.tar.gz .
            rm -rf "$tmpdir"
          fi

          ls -la policy/bundles

      - name: Prepare CI environment files
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p secrets env artifacts/docker

          cat > .env.ci <<EOF
          POSTGRES_USER=postgres
          POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
          POSTGRES_DB=postgres
          POSTGRES_APP_USER=fg_user
          POSTGRES_APP_PASSWORD=${POSTGRES_PASSWORD}
          POSTGRES_APP_DB=frostgate

          REDIS_PASSWORD=${REDIS_PASSWORD}
          NATS_AUTH_TOKEN=${NATS_AUTH_TOKEN}

          FG_API_KEY=${FG_API_KEY}
          FG_AGENT_API_KEY=${FG_AGENT_API_KEY}
          FG_WEBHOOK_SECRET=${FG_WEBHOOK_SECRET}
          FG_ENCRYPTION_KEY=${FG_ENCRYPTION_KEY}
          FG_JWT_SECRET=${FG_JWT_SECRET}
          FG_SESSION_SECRET=${FG_SESSION_SECRET}

          FG_ENV=prod
          FG_DEBUG=false
          FG_LOG_LEVEL=info
          FG_ENFORCEMENT_MODE=enforce

          FG_DB_BACKEND=postgres
          FG_DB_URL=postgresql+psycopg://fg_user:${POSTGRES_PASSWORD}@postgres:5432/frostgate
          FG_DB_MIGRATIONS_REQUIRED=1
          FG_DB_MIGRATIONS_RISK_ACCEPTED=0

          FG_OIDC_SCOPES=openid profile email
          FG_AUTH_ALLOW_FALLBACK=false

          FG_OPA_URL=http://opa:8181
          FG_OPA_ENFORCE=1
          FG_OPA_RISK_ACCEPTED=0

          FG_REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
          FG_NATS_URL=nats://${NATS_AUTH_TOKEN}@nats:4222
          FG_NATS_ENABLED=1
          FG_NATS_RISK_ACCEPTED=0

          FG_GOVERNANCE_ENABLED=1
          FG_ROE_ENGINE_ENABLED=1
          FG_RING_ROUTER_ENABLED=1
          FG_MISSION_ENVELOPE_ENABLED=1

          FG_MISSION_ENVELOPE_PATH=/var/lib/frostgate/mission/envelope.json
          FG_RING_STATE_DIR=/var/lib/frostgate/ring/state
          FG_RING_MODEL_DIR=/var/lib/frostgate/ring/models

          FG_DOS_GUARD_ENABLED=true
          FG_MAX_BODY_BYTES=4194304
          FG_MAX_QUERY_BYTES=8192
          FG_MAX_PATH_BYTES=2048
          FG_MAX_HEADERS_COUNT=50
          FG_MAX_HEADERS_BYTES=16384
          FG_MAX_HEADER_LINE_BYTES=8192
          FG_MULTIPART_MAX_BYTES=10485760
          FG_MULTIPART_MAX_PARTS=20
          FG_REQUEST_TIMEOUT_SEC=30
          FG_KEEPALIVE_TIMEOUT_SEC=65
          FG_MAX_CONCURRENT_REQUESTS=200
          FG_RL_FAIL_OPEN=false

          FG_CORS_ORIGINS=http://127.0.0.1:13000,http://127.0.0.1:18080
          AG_CORS_ORIGINS=http://127.0.0.1:13000
          AG_AUDIT_ENABLED=true

          FG_DEV_AUTH_BYPASS=0
          FG_DEV_TENANT_ID=default
          FG_DEV_ALLOWED_TENANTS=default
          EOF

          cp .env.ci .env

          cat > env/prod.env <<EOF
          FG_ENV=prod
          FG_DEBUG=false
          FG_LOG_LEVEL=info
          FG_ENFORCEMENT_MODE=enforce

          POSTGRES_USER=postgres
          POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
          POSTGRES_DB=postgres
          POSTGRES_APP_USER=fg_user
          POSTGRES_APP_PASSWORD=${POSTGRES_PASSWORD}
          POSTGRES_APP_DB=frostgate

          FG_DB_BACKEND=postgres
          FG_DB_URL=postgresql+psycopg://fg_user:${POSTGRES_PASSWORD}@postgres:5432/frostgate
          FG_DB_MIGRATIONS_REQUIRED=1
          FG_DB_MIGRATIONS_RISK_ACCEPTED=0

          FG_OIDC_SCOPES=openid profile email
          FG_AUTH_ALLOW_FALLBACK=false

          FG_OPA_URL=http://opa:8181
          FG_OPA_ENFORCE=1
          FG_OPA_RISK_ACCEPTED=0

          REDIS_PASSWORD=${REDIS_PASSWORD}
          FG_REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0

          NATS_AUTH_TOKEN=${NATS_AUTH_TOKEN}
          FG_NATS_URL=nats://${NATS_AUTH_TOKEN}@nats:4222
          FG_NATS_ENABLED=1
          FG_NATS_RISK_ACCEPTED=0

          FG_GOVERNANCE_ENABLED=1
          FG_ROE_ENGINE_ENABLED=1
          FG_RING_ROUTER_ENABLED=1
          FG_MISSION_ENVELOPE_ENABLED=1

          FG_MISSION_ENVELOPE_PATH=/var/lib/frostgate/mission/envelope.json
          FG_RING_STATE_DIR=/var/lib/frostgate/ring/state
          FG_RING_MODEL_DIR=/var/lib/frostgate/ring/models

          FG_DOS_GUARD_ENABLED=true
          FG_MAX_BODY_BYTES=4194304
          FG_MAX_QUERY_BYTES=8192
          FG_MAX_PATH_BYTES=2048
          FG_MAX_HEADERS_COUNT=50
          FG_MAX_HEADERS_BYTES=16384
          FG_MAX_HEADER_LINE_BYTES=8192
          FG_MULTIPART_MAX_BYTES=10485760
          FG_MULTIPART_MAX_PARTS=20
          FG_REQUEST_TIMEOUT_SEC=30
          FG_KEEPALIVE_TIMEOUT_SEC=65
          FG_MAX_CONCURRENT_REQUESTS=200
          FG_RL_FAIL_OPEN=false

          FG_API_KEY=${FG_API_KEY}
          FG_AGENT_API_KEY=${FG_AGENT_API_KEY}
          FG_WEBHOOK_SECRET=${FG_WEBHOOK_SECRET}
          FG_SESSION_SECRET=${FG_SESSION_SECRET}
          FG_ENCRYPTION_KEY=${FG_ENCRYPTION_KEY}
          FG_JWT_SECRET=${FG_JWT_SECRET}

          FG_CORS_ORIGINS=http://127.0.0.1:13000,http://127.0.0.1:18080
          AG_CORS_ORIGINS=http://127.0.0.1:13000
          AG_AUDIT_ENABLED=true

          FG_DEV_AUTH_BYPASS=0
          FG_DEV_TENANT_ID=default
          FG_DEV_ALLOWED_TENANTS=default
          EOF

          printf '%s\n' "${FG_API_KEY}" > secrets/fg_api_keys.txt

      - name: Show effective compose files
        shell: bash
        env:
          DATABASE_URL: postgres://ci:ci@localhost:5432/ci
          FG_SIGNING_SECRET: ci-signing-secret-32-bytes-minimum
          FG_INTERNAL_AUTH_SECRET: ci-internal-auth-secret-32-bytes
        run: |
          set -euo pipefail
          docker compose --env-file .env.ci config > /tmp/fg.compose.rendered.yml
          cp /tmp/fg.compose.rendered.yml artifacts/docker/compose.rendered.yml

      - name: Validate compose config
        shell: bash
        env:
          DATABASE_URL: postgres://ci:ci@localhost:5432/ci
          FG_SIGNING_SECRET: ci-signing-secret-32-bytes-minimum
          FG_INTERNAL_AUTH_SECRET: ci-internal-auth-secret-32-bytes
        run: |
          set -euo pipefail
          docker compose --env-file .env.ci config >/dev/null

      - name: Build images via docker compose
        shell: bash
        env:
          DATABASE_URL: postgres://ci:ci@localhost:5432/ci
          FG_SIGNING_SECRET: ci-signing-secret-32-bytes-minimum
          FG_INTERNAL_AUTH_SECRET: ci-internal-auth-secret-32-bytes
        run: |
          set -euo pipefail
          docker compose --env-file .env.ci build --pull

      - name: Start opa-bundles first
        shell: bash
        env:
          DATABASE_URL: postgres://ci:ci@localhost:5432/ci
          FG_SIGNING_SECRET: ci-signing-secret-32-bytes-minimum
          FG_INTERNAL_AUTH_SECRET: ci-internal-auth-secret-32-bytes
        run: |
          set -euo pipefail
          docker compose --env-file .env.ci up -d --force-recreate opa-bundles

      - name: Wait for opa-bundles healthy
        shell: bash
        run: |
          set -euo pipefail
          timeout 60 bash -lc '
            until [ "$(docker inspect -f "{{.State.Health.Status}}" fg-core-opa-bundles-1 2>/dev/null || true)" = "healthy" ]; do
              docker ps --filter name=fg-core-opa-bundles-1 --format "opa-bundles status={{.Status}}"
              sleep 2
            done
          '

      - name: Start full stack
        shell: bash
        env:
          DATABASE_URL: postgres://ci:ci@localhost:5432/ci
          FG_SIGNING_SECRET: ci-signing-secret-32-bytes-minimum
          FG_INTERNAL_AUTH_SECRET: ci-internal-auth-secret-32-bytes
        run: |
          set -euo pipefail
          docker compose --env-file .env.ci up -d --force-recreate

      - name: Wait for admin-gateway health
        shell: bash
        run: |
          set -euo pipefail
          echo "Waiting for admin-gateway on 127.0.0.1:18080 ..."
          for i in $(seq 1 45); do
            if curl -fsS http://127.0.0.1:18080/health >/dev/null; then
              echo "admin-gateway is healthy"
              exit 0
            fi
            sleep 2
          done
          echo "::error::admin-gateway failed to become healthy in time"
          docker compose --env-file .env.ci ps
          exit 1

      - name: Smoke test console root
        shell: bash
        run: |
          set -euo pipefail
          echo "Waiting for console on 127.0.0.1:13000 ..."
          for i in $(seq 1 45); do
            if curl -fsS http://127.0.0.1:13000 >/dev/null; then
              echo "console is reachable"
              exit 0
            fi
            sleep 2
          done
          echo "::error::console failed to become reachable in time"
          docker compose --env-file .env.ci ps
          exit 1

      - name: Persist docker diagnostics
        if: always()
        shell: bash
        run: |
          set +e
          mkdir -p artifacts/docker

          docker compose --env-file .env.ci ps > artifacts/docker/compose-ps.txt 2>&1 || true
          docker compose --env-file .env.ci logs --tail=400 > artifacts/docker/compose-logs.txt 2>&1 || true
          docker images > artifacts/docker/docker-images.txt 2>&1 || true
          docker inspect fg-core-admin-gateway-1 > artifacts/docker/admin-gateway.inspect.json 2>/dev/null || true
          docker inspect fg-core-console-1 > artifacts/docker/console.inspect.json 2>/dev/null || true
          docker inspect fg-core-opa-bundles-1 > artifacts/docker/opa-bundles.inspect.json 2>/dev/null || true
          docker inspect fg-core-opa-1 > artifacts/docker/opa.inspect.json 2>/dev/null || true
          docker exec -t fg-core-opa-bundles-1 nginx -T > artifacts/docker/opa-bundles-nginx.txt 2>&1 || true

      - name: Upload docker artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frostgate-docker-artifacts-${{ github.run_attempt }}
          path: |
            artifacts/docker/**
            /tmp/fg.compose.rendered.yml
          if-no-files-found: ignore
          retention-days: 7

      - name: Tear down stack
        if: always()
        shell: bash
        env:
          DATABASE_URL: postgres://ci:ci@localhost:5432/ci
          FG_SIGNING_SECRET: ci-signing-secret-32-bytes-minimum
          FG_INTERNAL_AUTH_SECRET: ci-internal-auth-secret-32-bytes
        run: |
          set +e
          docker compose --env-file .env.ci down -v --remove-orphans

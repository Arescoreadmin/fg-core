name: frostgate-docker-ci

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: frostgate-docker-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  docker-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      COMPOSE_PROJECT_NAME: fg-core
      PYTHONHASHSEED: "0"
      TZ: "UTC"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate CI secrets
        run: |
          python - <<'PY' >> "$GITHUB_ENV"
          import secrets

          def tok(n: int) -> str:
              return secrets.token_urlsafe(n)

          print(f"FG_API_KEY={tok(32)}")
          print(f"REDIS_PASSWORD={tok(24)}")
          print(f"POSTGRES_PASSWORD={tok(24)}")
          print(f"NATS_AUTH_TOKEN={tok(24)}")
          print(f"FG_AGENT_API_KEY={tok(24)}")
          print(f"FG_WEBHOOK_SECRET={tok(32)}")
          print(f"FG_ENCRYPTION_KEY={tok(32)}")
          print(f"FG_JWT_SECRET={tok(32)}")
          PY

      - name: Verify required env vars are set
        run: |
          set -euo pipefail
          missing=0
          for var in \
            FG_API_KEY \
            REDIS_PASSWORD \
            POSTGRES_PASSWORD \
            NATS_AUTH_TOKEN \
            FG_AGENT_API_KEY \
            FG_WEBHOOK_SECRET \
            FG_ENCRYPTION_KEY \
            FG_JWT_SECRET
          do
            if [ -n "${!var:-}" ]; then
              echo "${var}=set"
            else
              echo "${var}=missing"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "Required env vars missing; aborting."
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Ensure required policy bundle files exist
        run: |
          set -euo pipefail

          mkdir -p policy/bundles

          test -f policy/bundles/nginx.conf
          test -f policy/opa/config.yaml

          if [ -f policy/opa/opa-config.yml ]; then
            echo "ERROR: stale policy/opa/opa-config.yml exists and can cause OPA merge errors"
            sed -n '1,200p' policy/opa/opa-config.yml || true
            exit 1
          fi

          if [ ! -f policy/bundles/bundle.tar.gz ]; then
            echo "ERROR: missing policy/bundles/bundle.tar.gz"
            ls -la policy/bundles || true
            exit 1
          fi

          echo "OPA bundle inputs present"
          ls -la policy/bundles

      - name: Prepare environment
        run: |
          set -euo pipefail

          cp .env.example .env.ci

          mkdir -p secrets
          {
            echo "FG_ENV=test"
            echo "FG_API_KEY=${FG_API_KEY}"
            echo "REDIS_PASSWORD=${REDIS_PASSWORD}"
            echo "POSTGRES_PASSWORD=${POSTGRES_PASSWORD}"
            echo "NATS_AUTH_TOKEN=${NATS_AUTH_TOKEN}"
            echo "FG_AGENT_API_KEY=${FG_AGENT_API_KEY}"
            echo "FG_WEBHOOK_SECRET=${FG_WEBHOOK_SECRET}"
            echo "FG_ENCRYPTION_KEY=${FG_ENCRYPTION_KEY}"
            echo "FG_JWT_SECRET=${FG_JWT_SECRET}"
            echo "FG_NATS_URL=nats://${NATS_AUTH_TOKEN}@nats:4222"
          } >> .env.ci

          cp .env.ci .env
          printf '%s\n' "${FG_API_KEY}" > secrets/fg_api_keys.txt

          echo "=== .env.ci sanity (redacted) ==="
          sed \
            -e 's/^\(FG_API_KEY=\).*/\1[REDACTED]/' \
            -e 's/^\(REDIS_PASSWORD=\).*/\1[REDACTED]/' \
            -e 's/^\(POSTGRES_PASSWORD=\).*/\1[REDACTED]/' \
            -e 's/^\(NATS_AUTH_TOKEN=\).*/\1[REDACTED]/' \
            -e 's/^\(FG_AGENT_API_KEY=\).*/\1[REDACTED]/' \
            -e 's/^\(FG_WEBHOOK_SECRET=\).*/\1[REDACTED]/' \
            -e 's/^\(FG_ENCRYPTION_KEY=\).*/\1[REDACTED]/' \
            -e 's/^\(FG_JWT_SECRET=\).*/\1[REDACTED]/' \
            .env.ci

      - name: Render docker compose config
        run: |
          set -euo pipefail
          unset COMPOSE_FILE
          unset COMPOSE_PROFILES
          docker compose \
            -f docker-compose.yml \
            -f docker-compose.lockdown.yml \
            -f docker-compose.override.yml \
            --env-file .env.ci \
            --profile core \
            --profile admin \
            config > /tmp/fg.compose.rendered.yml

          test -s /tmp/fg.compose.rendered.yml
          sed -n '1,220p' /tmp/fg.compose.rendered.yml

      - name: Debug console source tree before docker build
        run: |
          set -euo pipefail

          echo "=== git identity ==="
          git rev-parse HEAD
          git status --short || true

          echo
          echo "=== console key files ==="
          ls -l console/lib
          ls -l console/components/tables
          test -f console/lib/api.ts
          test -f console/lib/coreApi.ts
          test -f console/styles/tokens.ts
          test -f console/components/tables/DecisionsTable.tsx

          echo
          echo "=== tsconfig ==="
          sed -n '1,120p' console/tsconfig.json

          echo
          echo "=== imports ==="
          grep -RInE "@/lib/coreApi|@/lib/api|@/styles/tokens|@/components/tables/DecisionsTable" console || true

          echo
          echo "=== docker build context sanity ==="
          find console -maxdepth 3 -type f | sort | sed -n '1,220p'

      - name: Build images via docker compose
        run: |
          set -euo pipefail
          unset COMPOSE_FILE
          unset COMPOSE_PROFILES
          docker compose \
            -f docker-compose.yml \
            -f docker-compose.lockdown.yml \
            -f docker-compose.override.yml \
            --env-file .env.ci \
            --profile core \
            --profile admin \
            build --no-cache

      - name: Start opa-bundles first
        run: |
          set -euo pipefail
          unset COMPOSE_FILE
          unset COMPOSE_PROFILES
          docker compose \
            -f docker-compose.yml \
            -f docker-compose.lockdown.yml \
            -f docker-compose.override.yml \
            --env-file .env.ci \
            --profile core \
            --profile admin \
            up -d --force-recreate opa-bundles

      - name: Wait for opa-bundles healthy
        run: |
          set -euo pipefail
          unset COMPOSE_FILE
          unset COMPOSE_PROFILES
          OPA_BUNDLES_CID="$(
            docker compose \
              -f docker-compose.yml \
              -f docker-compose.lockdown.yml \
              -f docker-compose.override.yml \
              --env-file .env.ci \
              --profile core \
              --profile admin \
              ps -q opa-bundles
          )"

          test -n "${OPA_BUNDLES_CID}"

          timeout 90 bash -lc '
            cid="'"${OPA_BUNDLES_CID}"'"
            until [ "$(docker inspect -f "{{.State.Health.Status}}" "$cid" 2>/dev/null)" = "healthy" ]; do
              st="$(docker inspect -f "{{.State.Status}}/{{if .State.Health}}{{.State.Health.Status}}{{else}}no-healthcheck{{end}}" "$cid" 2>/dev/null || true)"
              echo "opa-bundles: ${st}"
              sleep 2
            done
          '

      - name: Start full stack
        run: |
          set -euo pipefail
          unset COMPOSE_FILE
          unset COMPOSE_PROFILES
          docker compose \
            -f docker-compose.yml \
            -f docker-compose.lockdown.yml \
            -f docker-compose.override.yml \
            --env-file .env.ci \
            --profile core \
            --profile admin \
            up -d --build

      - name: Smoke test admin-gateway /health
        run: |
          set -euo pipefail
          echo "Waiting for admin-gateway on 127.0.0.1:18080 ..."
          for i in $(seq 1 60); do
            if curl -fsS --max-time 3 http://127.0.0.1:18080/health >/dev/null; then
              echo "admin-gateway is healthy"
              exit 0
            fi
            sleep 2
          done
          echo "admin-gateway failed to become healthy in time"
          exit 1

      - name: Debug dump (containers + logs)
        if: failure()
        run: |
          set +e
          unset COMPOSE_FILE
          unset COMPOSE_PROFILES

          echo "=== git identity ==="
          git rev-parse HEAD || true

          echo
          echo "=== docker compose ps ==="
          docker compose \
            -f docker-compose.yml \
            -f docker-compose.lockdown.yml \
            -f docker-compose.override.yml \
            --env-file .env.ci \
            --profile core \
            --profile admin \
            ps

          echo
          echo "=== docker compose logs (tail=300) ==="
          docker compose \
            -f docker-compose.yml \
            -f docker-compose.lockdown.yml \
            -f docker-compose.override.yml \
            --env-file .env.ci \
            --profile core \
            --profile admin \
            logs --tail=300 || true

          echo
          echo "=== console key files on runner ==="
          ls -l console/lib || true
          ls -l console/components/tables || true
          sed -n '1,120p' console/tsconfig.json || true
          grep -RInE "@/lib/coreApi|@/lib/api|@/styles/tokens|@/components/tables/DecisionsTable" console || true

          echo
          echo "=== opa-bundles nginx config ==="
          cid="$(
            docker compose \
              -f docker-compose.yml \
              -f docker-compose.lockdown.yml \
              -f docker-compose.override.yml \
              --env-file .env.ci \
              --profile core \
              --profile admin \
              ps -q opa-bundles
          )"
          if [ -n "${cid}" ]; then
            docker exec -t "$cid" nginx -T || true
          else
            echo "opa-bundles container not found"
          fi

          echo
          echo "=== rendered compose config ==="
          sed -n '1,260p' /tmp/fg.compose.rendered.yml || true

      - name: Tear down stack
        if: always()
        run: |
          unset COMPOSE_FILE
          unset COMPOSE_PROFILES
          docker compose \
            -f docker-compose.yml \
            -f docker-compose.lockdown.yml \
            -f docker-compose.override.yml \
            --env-file .env.ci \
            --profile core \
            --profile admin \
            down -v --remove-orphans || true
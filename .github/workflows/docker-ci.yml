name: frostgate-docker-ci

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: frostgate-docker-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  docker-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      COMPOSE_PROJECT_NAME: fg-core

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate CI secrets
        shell: bash
        run: |
          python - <<'PY' >> "$GITHUB_ENV"
          import secrets

          print(f"FG_API_KEY={secrets.token_urlsafe(32)}")
          print(f"REDIS_PASSWORD={secrets.token_urlsafe(24)}")
          print(f"POSTGRES_PASSWORD={secrets.token_urlsafe(24)}")
          print(f"NATS_AUTH_TOKEN={secrets.token_urlsafe(24)}")
          print(f"FG_AGENT_API_KEY={secrets.token_urlsafe(24)}")
          print(f"FG_WEBHOOK_SECRET={secrets.token_urlsafe(32)}")
          PY

      - name: Verify required env vars are set
        shell: bash
        run: |
          set -euo pipefail
          missing=0
          for var in FG_API_KEY REDIS_PASSWORD POSTGRES_PASSWORD NATS_AUTH_TOKEN FG_AGENT_API_KEY FG_WEBHOOK_SECRET; do
            if [ -n "${!var:-}" ]; then
              echo "${var}=set"
            else
              echo "${var}=missing"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "Required env vars missing; aborting."
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Ensure required policy bundle files exist
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p policy/bundles

          if [ ! -f policy/bundles/nginx.conf ]; then
            echo "WARN: policy/bundles/nginx.conf missing in repo. Creating CI fallback." >&2
            python - <<'PY'
            from pathlib import Path

            p = Path("policy/bundles/nginx.conf")
            p.write_text(
                """# policy/bundles/nginx.conf
            pid /tmp/nginx.pid;

            events {}

            http {
              client_body_temp_path /tmp/client_body_temp;
              proxy_temp_path       /tmp/proxy_temp;
              fastcgi_temp_path     /tmp/fastcgi_temp;
              uwsgi_temp_path       /tmp/uwsgi_temp;
              scgi_temp_path        /tmp/scgi_temp;

              server {
                listen 80;

                location /health { return 200 "ok\\n"; }

                location / {
                  root /usr/share/nginx/html;
                  try_files $uri =404;
                }
              }
            }
            """
            )
            print("CI wrote fallback", p)
            PY
          fi

          test -f policy/bundles/_ci_notice.txt || echo "CI bundle placeholder" > policy/bundles/_ci_notice.txt
          test -s policy/bundles/nginx.conf
          sed -n '1,160p' policy/bundles/nginx.conf

      - name: Prepare environment
        shell: bash
        run: |
          set -euo pipefail
          cp .env.example .env.ci

          mkdir -p secrets
          {
            echo "FG_ENV=test"
            echo "FG_API_KEY=${FG_API_KEY}"
            echo "REDIS_PASSWORD=${REDIS_PASSWORD}"
            echo "POSTGRES_PASSWORD=${POSTGRES_PASSWORD}"
            echo "NATS_AUTH_TOKEN=${NATS_AUTH_TOKEN}"
            echo "FG_AGENT_API_KEY=${FG_AGENT_API_KEY}"
            echo "FG_WEBHOOK_SECRET=${FG_WEBHOOK_SECRET}"
          } >> .env.ci

          cp .env.ci .env
          printf '%s\n' "${FG_API_KEY}" > secrets/fg_api_keys.txt

          echo "=== .env.ci sanity (redacted) ==="
          sed \
            -e 's/^\(FG_API_KEY=\).*/\1[REDACTED]/' \
            -e 's/^\(REDIS_PASSWORD=\).*/\1[REDACTED]/' \
            -e 's/^\(POSTGRES_PASSWORD=\).*/\1[REDACTED]/' \
            -e 's/^\(NATS_AUTH_TOKEN=\).*/\1[REDACTED]/' \
            -e 's/^\(FG_AGENT_API_KEY=\).*/\1[REDACTED]/' \
            -e 's/^\(FG_WEBHOOK_SECRET=\).*/\1[REDACTED]/' \
            .env.ci

      - name: Render docker compose config
        shell: bash
        run: |
          set -euo pipefail
          unset COMPOSE_FILE
          unset COMPOSE_PROFILES
          docker compose \
            -f docker-compose.yml \
            -f docker-compose.lockdown.yml \
            -f docker-compose.override.yml \
            --env-file .env.ci \
            --profile core \
            --profile admin \
            config > /tmp/fg.compose.rendered.yml

          test -s /tmp/fg.compose.rendered.yml
          sed -n '1,220p' /tmp/fg.compose.rendered.yml

      - name: Build images via docker compose
        shell: bash
        run: |
          set -euo pipefail
          unset COMPOSE_FILE
          unset COMPOSE_PROFILES
          docker compose \
            -f docker-compose.yml \
            -f docker-compose.lockdown.yml \
            -f docker-compose.override.yml \
            --env-file .env.ci \
            --profile core \
            --profile admin \
            build

      - name: Start opa-bundles first
        shell: bash
        run: |
          set -euo pipefail
          unset COMPOSE_FILE
          unset COMPOSE_PROFILES
          docker compose \
            -f docker-compose.yml \
            -f docker-compose.lockdown.yml \
            -f docker-compose.override.yml \
            --env-file .env.ci \
            --profile core \
            --profile admin \
            up -d --force-recreate opa-bundles

      - name: Wait for opa-bundles healthy
        shell: bash
        run: |
          set -euo pipefail
          unset COMPOSE_FILE
          unset COMPOSE_PROFILES
          OPA_BUNDLES_CID="$(
            docker compose \
              -f docker-compose.yml \
              -f docker-compose.lockdown.yml \
              -f docker-compose.override.yml \
              --env-file .env.ci \
              --profile core \
              --profile admin \
              ps -q opa-bundles
          )"

          test -n "${OPA_BUNDLES_CID}"

          timeout 90 bash -lc '
            cid="'"${OPA_BUNDLES_CID}"'"
            until [ "$(docker inspect -f "{{.State.Health.Status}}" "$cid" 2>/dev/null)" = "healthy" ]; do
              st="$(docker inspect -f "{{.State.Status}}/{{if .State.Health}}{{.State.Health.Status}}{{else}}no-healthcheck{{end}}" "$cid" 2>/dev/null || true)"
              echo "opa-bundles: ${st}"
              sleep 2
            done
          '

      - name: Start full stack
        shell: bash
        run: |
          set -euo pipefail
          unset COMPOSE_FILE
          unset COMPOSE_PROFILES
          docker compose \
            -f docker-compose.yml \
            -f docker-compose.lockdown.yml \
            -f docker-compose.override.yml \
            --env-file .env.ci \
            --profile core \
            --profile admin \
            up -d --build

      - name: Smoke test admin-gateway /health
        shell: bash
        run: |
          set -euo pipefail
          echo "Waiting for admin-gateway on 127.0.0.1:18080 ..."
          for i in $(seq 1 60); do
            if curl -fsS --max-time 3 http://127.0.0.1:18080/health >/dev/null; then
              echo "admin-gateway is healthy"
              exit 0
            fi
            sleep 2
          done
          echo "admin-gateway failed to become healthy in time"
          exit 1

      - name: Debug dump (containers + logs)
        if: failure()
        shell: bash
        run: |
          set +e
          unset COMPOSE_FILE
          unset COMPOSE_PROFILES

          echo "=== docker compose ps ==="
          docker compose \
            -f docker-compose.yml \
            -f docker-compose.lockdown.yml \
            -f docker-compose.override.yml \
            --env-file .env.ci \
            --profile core \
            --profile admin \
            ps

          echo
          echo "=== docker compose logs (tail=300) ==="
          docker compose \
            -f docker-compose.yml \
            -f docker-compose.lockdown.yml \
            -f docker-compose.override.yml \
            --env-file .env.ci \
            --profile core \
            --profile admin \
            logs --tail=300 || true

          echo
          echo "=== opa-bundles nginx config ==="
          cid="$(
            docker compose \
              -f docker-compose.yml \
              -f docker-compose.lockdown.yml \
              -f docker-compose.override.yml \
              --env-file .env.ci \
              --profile core \
              --profile admin \
              ps -q opa-bundles
          )"
          if [ -n "${cid}" ]; then
            docker exec -t "$cid" nginx -T || true
          else
            echo "opa-bundles container not found"
          fi

          echo
          echo "=== rendered compose config ==="
          sed -n '1,260p' /tmp/fg.compose.rendered.yml || true

      - name: Tear down stack
        if: always()
        shell: bash
        run: |
          unset COMPOSE_FILE
          unset COMPOSE_PROFILES
          docker compose \
            -f docker-compose.yml \
            -f docker-compose.lockdown.yml \
            -f docker-compose.override.yml \
            --env-file .env.ci \
            --profile core \
            --profile admin \
            down -v --remove-orphans || true
name: frostgate-release-images

on:
  push:
    branches: ["main"]
    tags:
      - "v*.*.*"
  workflow_dispatch:

concurrency:
  group: frostgate-release-images-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read
      packages: write

    env:
      REGISTRY: ghcr.io
      IMAGE_OWNER: ${{ github.repository_owner }}
      DOCKER_BUILDKIT: "1"

    steps:
      - name: Checkout (full history + tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            constraints.txt
            pyproject.toml

      - name: Generate CI env (dummy secrets for gates)
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY' >> "$GITHUB_ENV"
          import secrets
          def tok(n): return secrets.token_urlsafe(n)
          print(f"FG_API_KEY={tok(32)}")
          print(f"FG_AGENT_API_KEY={tok(32)}")
          print(f"REDIS_PASSWORD={tok(24)}")
          print(f"POSTGRES_PASSWORD={tok(24)}")
          print(f"NATS_AUTH_TOKEN={tok(24)}")
          print(f"FG_WEBHOOK_SECRET={tok(32)}")
          # Optional: if any gates expect these, keep them non-empty.
          print("FG_ENV=ci")
          PY

      - name: Run tests (gate release via Makefile)
        shell: bash
        run: |
          set -euo pipefail
          make ci

      - name: Release gate check (blocks if Production-blocking gaps exist)
        shell: bash
        run: |
          set -euo pipefail
          make release-gate

      - name: Set up Go (with cache)
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Build supervisor-sidecar
        shell: bash
        run: |
          set -euo pipefail
          cd supervisor-sidecar
          go build ./...

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute VERSION
        id: version
        shell: bash
        run: |
          set -euo pipefail

          # Release tags: VERSION = vX.Y.Z exactly
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            # Main branch: edge-<sha>
            VERSION="edge-${GITHUB_SHA::12}"
          fi

          echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Computed VERSION=${VERSION}"

      - name: Build images
        shell: bash
        run: |
          set -euo pipefail
          REGISTRY='${{ env.REGISTRY }}' \
          IMAGE_OWNER='${{ env.IMAGE_OWNER }}' \
          VERSION='${{ steps.version.outputs.VERSION }}' \
          make docker-build
        env:
          # Build cache via GitHub Actions cache backend (works with buildx)
          BUILDKIT_PROGRESS: plain

      - name: Push images
        shell: bash
        run: |
          set -euo pipefail
          REGISTRY='${{ env.REGISTRY }}' \
          IMAGE_OWNER='${{ env.IMAGE_OWNER }}' \
          VERSION='${{ steps.version.outputs.VERSION }}' \
          make docker-push
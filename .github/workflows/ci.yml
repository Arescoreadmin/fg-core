# NOTE:
# - Console/Compliance gating uses repo-native changed-path detection.
# - DRY setup is implemented via composite actions in .github/actions/.
# - This workflow is optimized to fail fast, preserve artifacts, and avoid
#   unnecessary job fan-out when guarded paths are untouched.

name: frostgate-core-ci

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: frostgate-core-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHONHASHSEED: "0"
  TZ: "UTC"
  PYTHONUNBUFFERED: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_NO_PYTHON_VERSION_WARNING: "1"

defaults:
  run:
    shell: bash

jobs:
  fg_guard:
    name: Guard (paths + syntax + fg-fast)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    env:
      FG_ENV: dev
      FG_AUTH_ENABLED: "1"
      FG_ENFORCEMENT_MODE: observe
      FG_SQLITE_PATH: state/frostgate-ci-guard.db

    outputs:
      console: ${{ steps.filter.outputs.console }}
      compliance: ${{ steps.filter.outputs.compliance }}
      python: ${{ steps.filter.outputs.python }}
      core: ${{ steps.filter.outputs.core }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Detect changed paths
        id: filter
        run: python tools/ci/detect_changed_paths.py

      - name: Generate CI secrets
        uses: ./.github/actions/fg-secrets

      - name: Python setup (cached)
        uses: ./.github/actions/fg-python-setup
        with:
          python-version: "3.12"
          install-os-deps: "true"
          prepare-workspace: "true"
          build-venv: "true"

      - name: Verify FG_API_KEY is set
        run: python -c "import os; assert os.getenv('FG_API_KEY')"

      - name: Syntax / import guard (fast fail)
        run: python -m compileall -q api engine tests

      - name: SQL migration percent-token guard
        run: python tools/ci/guard_no_raw_percent_in_sql.py

      - name: Enforce tenant DB dependency lint
        run: python tools/ci/check_db_dependency.py

      - name: Enforce route scope lint
        run: python tools/ci/check_route_scopes.py

      - name: Enforce security regression gates
        run: python tools/ci/check_security_regression_gates.py

      - name: Run fg-fast guard lane
        run: make fg-fast-full
        env:
          FG_API_KEY: ${{ env.FG_API_KEY }}

      - name: Upload guard artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frostgate-guard-artifacts-${{ github.run_attempt }}
          path: |
            artifacts/**
            state/**
          if-no-files-found: ignore
          retention-days: 7

  enforcement_mode_matrix:
    name: Enforcement Mode Matrix (prod/staging)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: fg_guard
    if: ${{ github.event_name == 'pull_request' || needs.fg_guard.outputs.core == 'true' || needs.fg_guard.outputs.python == 'true' }}
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Generate CI secrets
        uses: ./.github/actions/fg-secrets

      - name: Python setup (cached)
        uses: ./.github/actions/fg-python-setup
        with:
          python-version: "3.12"
          install-os-deps: "true"
          prepare-workspace: "true"
          build-venv: "true"

      - name: Run enforcement-mode matrix check
        run: make enforcement-mode-matrix

      - name: Upload enforcement artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frostgate-enforcement-mode-artifacts-${{ github.run_attempt }}
          path: |
            artifacts/**
            state/**
          if-no-files-found: ignore
          retention-days: 7

  unit:
    name: Unit (ci)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [fg_guard, enforcement_mode_matrix]
    if: ${{ github.event_name == 'pull_request' || needs.fg_guard.outputs.core == 'true' || needs.fg_guard.outputs.python == 'true' }}
    permissions:
      contents: read
    env:
      FG_ENV: dev
      FG_AUTH_ENABLED: "1"
      FG_ENFORCEMENT_MODE: observe
      FG_SQLITE_PATH: state/frostgate-ci.db

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Generate CI secrets
        uses: ./.github/actions/fg-secrets

      - name: Python setup (cached)
        uses: ./.github/actions/fg-python-setup
        with:
          python-version: "3.12"
          install-os-deps: "true"
          prepare-workspace: "true"
          build-venv: "true"

      - name: Verify FG_API_KEY is set
        run: python -c "import os; assert os.getenv('FG_API_KEY')"

      - name: Production profile check
        run: make prod-profile-check

      - name: Gap audit
        run: make gap-audit

      - name: Run unit lane
        run: make ci
        env:
          FG_API_KEY: ${{ env.FG_API_KEY }}

      - name: Upload unit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frostgate-unit-artifacts-${{ github.run_attempt }}
          path: |
            artifacts/**
            state/**
          if-no-files-found: ignore
          retention-days: 7

  contract_authority:
    name: Contract Authority (prod-spec)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: fg_guard
    if: ${{ github.event_name == 'pull_request' || needs.fg_guard.outputs.core == 'true' || needs.fg_guard.outputs.python == 'true' }}
    permissions:
      contents: read
    env:
      FG_ENV: prod
      FG_CONTRACT_SPEC: prod

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Generate CI secrets
        uses: ./.github/actions/fg-secrets

      - name: Python setup (cached)
        uses: ./.github/actions/fg-python-setup
        with:
          python-version: "3.12"
          install-os-deps: "true"
          prepare-workspace: "true"
          build-venv: "true"

      - name: Verify FG_WEBHOOK_SECRET is set for prod job
        run: python -c "import os; assert os.getenv('FG_WEBHOOK_SECRET')"

      - name: Verify prod OpenAPI contract drift
        run: make contracts-core-diff

      - name: Verify contract authority markers
        run: make contract-authority-check

      - name: Upload contract artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frostgate-contract-authority-artifacts-${{ github.run_attempt }}
          path: |
            artifacts/**
            state/**
          if-no-files-found: ignore
          retention-days: 7

  integration:
    name: Integration (itest-local)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: unit
    if: ${{ needs.unit.result == 'success' }}
    permissions:
      contents: read
    env:
      FG_ENV: dev
      FG_AUTH_ENABLED: "1"
      FG_ENFORCEMENT_MODE: observe
      FG_SQLITE_PATH: state/frostgate-ci-integration.db
      ITEST_HOST: 127.0.0.1
      ITEST_PORT: 8001
      ITEST_WIPE_DB: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Generate CI secrets
        uses: ./.github/actions/fg-secrets

      - name: Python setup (cached)
        uses: ./.github/actions/fg-python-setup
        with:
          python-version: "3.12"
          install-os-deps: "true"
          prepare-workspace: "true"
          build-venv: "true"

      - name: Verify FG_API_KEY is set
        run: python -c "import os; assert os.getenv('FG_API_KEY')"

      - name: Syntax / import guard
        run: python -m compileall -q api engine tests

      - name: Run integration lane
        run: make ci-integration

      - name: Upload integration artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frostgate-integration-artifacts-${{ github.run_attempt }}
          path: |
            artifacts/**
            state/**
          if-no-files-found: ignore
          retention-days: 7

  migrations_replay:
    name: Migrations Replay
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: fg_guard
    if: ${{ github.event_name == 'pull_request' || needs.fg_guard.outputs.core == 'true' || needs.fg_guard.outputs.python == 'true' }}
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: fg_user
          POSTGRES_PASSWORD: fg_password
          POSTGRES_DB: frostgate
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U fg_user -d frostgate"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
    env:
      FG_ENV: test
      FG_DB_BACKEND: postgres
      FG_DB_URL: postgresql+psycopg://fg_user:fg_password@127.0.0.1:5432/frostgate

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Generate CI secrets
        uses: ./.github/actions/fg-secrets

      - name: Python setup (cached)
        uses: ./.github/actions/fg-python-setup
        with:
          python-version: "3.12"
          install-os-deps: "true"
          prepare-workspace: "true"
          build-venv: "true"

      - name: Run migration replay test
        run: pytest -q -s tests/test_migrations_postgres_replay.py

      - name: Upload migration replay artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frostgate-migrations-replay-artifacts-${{ github.run_attempt }}
          path: |
            artifacts/**
            state/**
          if-no-files-found: ignore
          retention-days: 7

  db_postgres_verify:
    name: DB Postgres Verify
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: fg_guard
    if: ${{ github.event_name == 'pull_request' || needs.fg_guard.outputs.core == 'true' || needs.fg_guard.outputs.python == 'true' }}
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: fg_user
          POSTGRES_PASSWORD: fg_password
          POSTGRES_DB: frostgate
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U fg_user -d frostgate"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
    env:
      FG_ENV: test
      FG_DB_BACKEND: postgres
      FG_DB_URL: postgresql+psycopg://fg_user:fg_password@127.0.0.1:5432/frostgate

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Generate CI secrets
        uses: ./.github/actions/fg-secrets

      - name: Python setup (cached)
        uses: ./.github/actions/fg-python-setup
        with:
          python-version: "3.12"
          install-os-deps: "true"
          prepare-workspace: "true"
          build-venv: "true"

      - name: Apply postgres migrations
        run: python api/db_migrations.py --backend postgres --apply

      - name: Postgres migration smoke test
        run: pytest -q tests/test_migrations_postgres_smoke.py

      - name: Upload postgres verify artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frostgate-db-postgres-verify-artifacts-${{ github.run_attempt }}
          path: |
            artifacts/**
            state/**
          if-no-files-found: ignore
          retention-days: 7

  admin:
    name: Admin Gateway (ci-admin)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: fg_guard
    if: ${{ github.event_name == 'pull_request' || needs.fg_guard.outputs.core == 'true' || needs.fg_guard.outputs.python == 'true' }}
    permissions:
      contents: read
    env:
      FG_ENV: dev
      FG_AUTH_ENABLED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Generate CI secrets
        uses: ./.github/actions/fg-secrets

      - name: Python setup (cached)
        uses: ./.github/actions/fg-python-setup
        with:
          python-version: "3.12"
          install-os-deps: "true"
          prepare-workspace: "false"
          build-venv: "true"

      - name: Verify FG_API_KEY is set
        run: python -c "import os; assert os.getenv('FG_API_KEY')"

      - name: Syntax / import guard
        run: python -m compileall -q api engine tests

      - name: Run admin gateway lane
        run: make ci-admin

      - name: Upload admin artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frostgate-admin-artifacts-${{ github.run_attempt }}
          path: |
            artifacts/**
            state/**
          if-no-files-found: ignore
          retention-days: 7

  console:
    name: Console (ci-console)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: fg_guard
    if: ${{ github.event_name == 'pull_request' || needs.fg_guard.outputs.console == 'true' }}
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Node (cached)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            console/package-lock.json
            package-lock.json

      - name: Generate CI secrets
        uses: ./.github/actions/fg-secrets

      - name: Run console lane
        run: make ci-console

      - name: Upload console artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frostgate-console-artifacts-${{ github.run_attempt }}
          path: |
            artifacts/**
            state/**
          if-no-files-found: ignore
          retention-days: 7

  pt:
    name: PT (ci-pt)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: fg_guard
    if: ${{ github.event_name == 'pull_request' || needs.fg_guard.outputs.core == 'true' || needs.fg_guard.outputs.python == 'true' }}
    permissions:
      contents: read
    env:
      FG_ENV: dev
      FG_AUTH_ENABLED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Generate CI secrets
        uses: ./.github/actions/fg-secrets

      - name: Python setup (cached)
        uses: ./.github/actions/fg-python-setup
        with:
          python-version: "3.12"
          install-os-deps: "true"
          prepare-workspace: "false"
          build-venv: "true"

      - name: Verify FG_API_KEY is set
        run: python -c "import os; assert os.getenv('FG_API_KEY')"

      - name: Syntax / import guard
        run: python -m compileall -q api engine tests

      - name: Run PT lane
        run: make ci-pt

      - name: Upload PT artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frostgate-pt-artifacts-${{ github.run_attempt }}
          path: |
            artifacts/**
            state/**
          if-no-files-found: ignore
          retention-days: 7

  hardening:
    name: Hardening Gates (ci-hardening)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: fg_guard
    if: ${{ github.event_name == 'pull_request' || needs.fg_guard.outputs.core == 'true' || needs.fg_guard.outputs.python == 'true' }}
    permissions:
      contents: read
    env:
      FG_ENV: dev
      FG_AUTH_ENABLED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Generate CI secrets
        uses: ./.github/actions/fg-secrets

      - name: Python setup (cached)
        uses: ./.github/actions/fg-python-setup
        with:
          python-version: "3.12"
          install-os-deps: "true"
          prepare-workspace: "false"
          build-venv: "true"

      - name: Verify FG_API_KEY is set
        run: python -c "import os; assert os.getenv('FG_API_KEY')"

      - name: Run Core Invariants (INV-001..INV-007)
        run: make test-core-invariants
        env:
          FG_API_KEY: ${{ env.FG_API_KEY }}

      - name: Syntax / import guard
        run: python -m compileall -q api engine tests

      - name: Security regression tests
        run: pytest tests/security -q

      - name: Run Hardening Tests - Decision Pipeline Unity
        run: make test-decision-unified

      - name: Run Hardening Tests - Tenant Isolation
        run: make test-tenant-isolation

      - name: Run Hardening Tests - Auth Hardening
        run: make test-auth-hardening

      - name: Upload hardening artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frostgate-hardening-artifacts-${{ github.run_attempt }}
          path: |
            artifacts/**
            state/**
          if-no-files-found: ignore
          retention-days: 7

  compliance:
    name: Compliance Gates
    runs-on: ubuntu-latest
    timeout-minutes: 35
    needs: fg_guard
    if: ${{ github.event_name == 'pull_request' || needs.fg_guard.outputs.compliance == 'true' }}
    permissions:
      contents: read
    env:
      FG_ENV: dev
      FG_AUTH_ENABLED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Generate CI secrets
        uses: ./.github/actions/fg-secrets

      - name: Python setup (cached)
        uses: ./.github/actions/fg-python-setup
        with:
          python-version: "3.12"
          install-os-deps: "false"
          prepare-workspace: "true"
          build-venv: "true"

      - name: Syntax / import guard
        run: python -m compileall -q api engine tests

      - name: Generate SBOM
        run: make compliance-sbom

      - name: Generate Provenance
        run: make compliance-provenance

      - name: Run CIS Checks
        run: make compliance-cis

      - name: Run SCAP Scan
        run: make compliance-scap

      - name: Verify Compliance Artifacts
        run: |
          set -euo pipefail
          test -f artifacts/sbom.json || (echo "SBOM missing" && exit 1)
          test -f artifacts/provenance.json || (echo "Provenance missing" && exit 1)
          test -f artifacts/cis_check.json || (echo "CIS check missing" && exit 1)
          test -f artifacts/scap_scan.json || (echo "SCAP scan missing" && exit 1)
          echo "All compliance artifacts generated"

      - name: Upload Compliance Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frostgate-compliance-artifacts-${{ github.run_attempt }}
          path: |
            artifacts/sbom.json
            artifacts/provenance.json
            artifacts/cis_check.json
            artifacts/scap_scan.json
          if-no-files-found: error
          retention-days: 14

  evidence:
    name: Evidence (ci-evidence)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: integration
    if: ${{ needs.integration.result == 'success' }}
    permissions:
      contents: read
    env:
      FG_ENV: dev
      FG_AUTH_ENABLED: "1"
      FG_ENFORCEMENT_MODE: observe
      FG_SQLITE_PATH: state/frostgate-ci-evidence.db
      ITEST_HOST: 127.0.0.1
      ITEST_PORT: 8001
      ITEST_WIPE_DB: "1"
      SCENARIO: spike

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Generate CI secrets
        uses: ./.github/actions/fg-secrets

      - name: Python setup (cached)
        uses: ./.github/actions/fg-python-setup
        with:
          python-version: "3.12"
          install-os-deps: "true"
          prepare-workspace: "true"
          build-venv: "true"

      - name: Verify FG_API_KEY is set
        run: python -c "import os; assert os.getenv('FG_API_KEY')"

      - name: Syntax / import guard
        run: python -m compileall -q api engine tests

      - name: Run evidence lane
        run: make ci-evidence

      - name: Install minisign
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends minisign
          minisign -V || true

      - name: Verify signature
        env:
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY || '' }}
          MINISIGN_PUBLIC_KEY: ${{ secrets.MINISIGN_PUBLIC_KEY || '' }}
        run: |
          set -euo pipefail
          out="$(cat artifacts/latest_evidence_dir.txt)"

          if [ ! -f "$out/manifest.sha256.minisig" ]; then
            if [ -z "${MINISIGN_SECRET_KEY:-}" ]; then
              echo "Skipping signature verification: MINISIGN_SECRET_KEY not available"
              exit 0
            fi
            echo "missing minisig (but MINISIGN_SECRET_KEY was set)"
            exit 1
          fi

          if [ -f keys/minisign.pub ]; then
            PUB="$(cat keys/minisign.pub)"
          else
            test -n "${MINISIGN_PUBLIC_KEY:-}" || (echo "no public key (keys/minisign.pub or MINISIGN_PUBLIC_KEY)" && exit 1)
            PUB="${MINISIGN_PUBLIC_KEY}"
          fi

          minisign -Vm "$out/manifest.sha256" -P "$PUB"
          echo "signature verified"

      - name: Upload evidence bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frostgate-evidence-bundle-${{ github.run_attempt }}
          path: |
            artifacts/frostgate_evidence_*.zip
            artifacts/latest_zip*.txt
            artifacts/latest_evidence_dir*.txt
            artifacts/**
            state/**
          if-no-files-found: error
          retention-days: 14

  agent_linux:
    name: Agent Linux (unit + contract)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: unit
    if: ${{ needs.unit.result == 'success' }}
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate CI secrets
        uses: ./.github/actions/fg-secrets

      - name: Python setup (cached)
        uses: ./.github/actions/fg-python-setup
        with:
          python-version: "3.12"
          install-os-deps: "true"
          prepare-workspace: "true"
          build-venv: "true"

      - name: Agent unit tests
        run: make agent-unit

      - name: Core OpenAPI contract refresh check
        run: make contracts-core-gen && git diff --exit-code contracts/core/openapi.json

      - name: Upload Linux agent artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frostgate-agent-linux-artifacts-${{ github.run_attempt }}
          path: |
            artifacts/**
            state/**
          if-no-files-found: ignore
          retention-days: 7

  agent_windows:
    name: Agent Windows Build
    runs-on: windows-latest
    timeout-minutes: 20
    needs: unit
    if: ${{ needs.unit.result == 'success' }}
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build Windows agent
        shell: powershell
        run: make agent-build-windows

      - name: Verify dist manifest and hash
        shell: powershell
        run: |
          if (!(Test-Path dist/manifest.json)) { throw "manifest missing" }
          if (!(Test-Path dist/frostgate-agent.exe.sha256)) { throw "sha256 missing" }

      - name: Upload Windows agent
        uses: actions/upload-artifact@v4
        with:
          name: frostgate-agent-windows-${{ github.run_attempt }}
          path: |
            dist/frostgate-agent.exe
            dist/frostgate-agent.exe.sha256
            dist/manifest.json
          if-no-files-found: error
          retention-days: 14
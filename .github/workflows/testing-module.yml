name: testing-module

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "tools/testing/policy/**"
  schedule:
    - cron: "15 3 * * *"

concurrency:
  group: testing-module-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHONHASHSEED: "0"
  TZ: "UTC"
  PYTHONUNBUFFERED: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_NO_PYTHON_VERSION_WARNING: "1"

defaults:
  run:
    shell: bash

jobs:
  fg-fast:
    name: fg-fast
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch base (origin/main) for drift comparisons
        run: |
          set -euo pipefail
          git fetch --no-tags --prune --depth=200 origin main

      - name: Setup Python + pip cache
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            constraints.txt
            pyproject.toml

      - name: Create venv + install deps
        run: |
          set -euo pipefail
          python -m venv .venv
          make venv

      - name: Prepare artifacts dir + fallback notice
        if: always()
        run: |
          set -euo pipefail
          mkdir -p artifacts/testing
          test -f artifacts/testing/_upload_notice.txt || \
            echo "testing-module artifacts prepared after failure" > artifacts/testing/_upload_notice.txt

      - name: Run fg-fast
        run: |
          set -euo pipefail
          make fg-fast

      - name: Required tests gate
        run: |
          set -euo pipefail
          make required-tests-gate

      - name: Policy drift check
        run: |
          set -euo pipefail
          BASE_REF="${{ github.base_ref }}"
          if [ -z "${BASE_REF}" ]; then
            BASE_REF="main"
          fi
          .venv/bin/python tools/testing/policy/check_policy_drift.py \
            --base-ref "${BASE_REF}" \
            --event-path "${{ github.event_path }}"

      - name: Runtime budget enforcement (fg-fast)
        run: |
          set -euo pipefail
          .venv/bin/python -c "from pathlib import Path; from tools.testing.harness.runtime_budgets import load_runtime_budgets, enforce_lane_budget; budgets = load_runtime_budgets(Path('tools/testing/policy/runtime_budgets.yaml')); ok, msg = enforce_lane_budget('fg-fast', 180, budgets, 150); print(msg); raise SystemExit(0 if ok else 1)"

      - name: Security invariant coverage
        run: |
          set -euo pipefail
          .venv/bin/python tools/testing/security/check_invariant_coverage.py

      - name: Lane runner (fg-fast)
        run: |
          set -euo pipefail
          .venv/bin/python tools/testing/harness/lane_runner.py --lane fg-fast --out-dir artifacts/testing

      - name: Upload artifacts (fg-fast)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fg-fast-artifacts-${{ github.run_attempt }}
          path: |
            artifacts/testing/**
            artifacts/**/_upload_notice.txt
          if-no-files-found: warn
          retention-days: 7

  fg-contract:
    name: fg-contract
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch base (origin/main) for drift comparisons
        run: |
          set -euo pipefail
          git fetch --no-tags --prune --depth=200 origin main

      - name: Setup Python + pip cache
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            constraints.txt
            pyproject.toml

      - name: Create venv + install deps
        run: |
          set -euo pipefail
          python -m venv .venv
          make venv

      - name: Prepare artifacts dir + fallback notice
        if: always()
        run: |
          set -euo pipefail
          mkdir -p artifacts/testing
          test -f artifacts/testing/_upload_notice.txt || \
            echo "testing-module artifacts prepared after failure" > artifacts/testing/_upload_notice.txt

      - name: Run fg-contract + contract drift check
        run: |
          set -euo pipefail
          make fg-contract
          .venv/bin/python tools/testing/contracts/check_contract_drift.py

      - name: Upload artifacts (fg-contract)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fg-contract-artifacts-${{ github.run_attempt }}
          path: |
            artifacts/testing/**
            artifacts/**/_upload_notice.txt
          if-no-files-found: warn
          retention-days: 7

  fg-security:
    name: fg-security
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python + pip cache
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            constraints.txt
            pyproject.toml

      - name: Create venv + install deps
        run: |
          set -euo pipefail
          python -m venv .venv
          make venv

      - name: Prepare artifacts dir + fallback notice
        if: always()
        run: |
          set -euo pipefail
          mkdir -p artifacts/testing
          test -f artifacts/testing/_upload_notice.txt || \
            echo "testing-module artifacts prepared after failure" > artifacts/testing/_upload_notice.txt

      - name: Run fg-security
        run: |
          set -euo pipefail
          make fg-security

      - name: Upload artifacts (fg-security)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fg-security-artifacts-${{ github.run_attempt }}
          path: |
            artifacts/testing/**
            artifacts/**/_upload_notice.txt
          if-no-files-found: warn
          retention-days: 7

  fg-full:
    name: fg-full
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    needs: [fg-fast, fg-contract, fg-security]
    if: ${{ needs.fg-fast.result == 'success' && needs.fg-contract.result == 'success' && needs.fg-security.result == 'success' }}

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python + pip cache
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            constraints.txt
            pyproject.toml

      - name: Create venv + install deps
        run: |
          set -euo pipefail
          python -m venv .venv
          make venv

      - name: Prepare artifacts dir + fallback notice
        if: always()
        run: |
          set -euo pipefail
          mkdir -p artifacts/testing
          test -f artifacts/testing/_upload_notice.txt || \
            echo "testing-module artifacts prepared after failure" > artifacts/testing/_upload_notice.txt

      - name: Run fg-full
        run: |
          set -euo pipefail
          make fg-full

      - name: Flake detection junit (non-blocking)
        run: |
          set -euo pipefail
          .venv/bin/python -m pytest -q tests/tools/test_flake_detection.py --junitxml artifacts/testing/junit.xml || true

      - name: Update runtime baseline (main only)
        if: ${{ github.ref_name == 'main' && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') }}
        run: |
          set -euo pipefail
          .venv/bin/python tools/testing/harness/runtime_baseline.py \
            --lane fg-full \
            --duration 1200 \
            --branch "${{ github.ref_name }}" \
            --event "${{ github.event_name }}"

      - name: Upload artifacts (fg-full)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fg-full-artifacts-${{ github.run_attempt }}
          path: |
            artifacts/testing/**
            artifacts/**/_upload_notice.txt
          if-no-files-found: warn
          retention-days: 7

  fg-flake-detect:
    name: fg-flake-detect
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    needs: [fg-full]
    if: ${{ needs.fg-full.result == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python + pip cache
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            constraints.txt
            pyproject.toml

      - name: Create venv + install deps
        run: |
          set -euo pipefail
          python -m venv .venv
          make venv

      - name: Prepare artifacts dir + fallback notice
        if: always()
        run: |
          set -euo pipefail
          mkdir -p artifacts/testing
          test -f artifacts/testing/_upload_notice.txt || \
            echo "flake-detect artifacts prepared after failure" > artifacts/testing/_upload_notice.txt

      - name: Download fg-full artifacts
        uses: actions/download-artifact@v4
        with:
          name: fg-full-artifacts-${{ github.run_attempt }}
          path: artifacts/testing

      - name: Ensure junit exists
        run: |
          set -euo pipefail
          test -f artifacts/testing/junit.xml || \
            printf '%s\n' '<testsuites><testsuite name="empty" tests="0" failures="0"/></testsuites>' > artifacts/testing/junit.xml

      - name: Run flake detect
        run: |
          set -euo pipefail
          .venv/bin/python -m tools.testing.harness.flake_detect \
            --junit artifacts/testing/junit.xml \
            --out artifacts/testing/flake-report.json

      - name: Upload artifacts (flake detect)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fg-flake-artifacts-${{ github.run_attempt }}
          path: |
            artifacts/testing/**
            artifacts/**/_upload_notice.txt
          if-no-files-found: warn
          retention-days: 7
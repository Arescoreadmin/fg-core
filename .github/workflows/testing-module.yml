name: testing-module

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "tools/testing/policy/**"
  schedule:
    - cron: "15 3 * * *"

concurrency:
  group: testing-module-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  fg-fast:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            constraints.txt
            pyproject.toml
      - uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('requirements.txt', 'requirements-dev.txt', 'constraints.txt') }}
      - run: python -m venv .venv
      - run: make venv
      - run: mkdir -p artifacts/testing
      - run: make fg-fast
      - run: make required-tests-gate
      - run: .venv/bin/python tools/testing/policy/check_policy_drift.py --base-ref "${{ github.base_ref || 'main' }}" --event-path "${{ github.event_path }}"
      - run: .venv/bin/python -c "from pathlib import Path; from tools.testing.harness.runtime_budgets import load_runtime_budgets,enforce_lane_budget; d=load_runtime_budgets(Path('tools/testing/policy/runtime_budgets.yaml')); ok,msg=enforce_lane_budget('fg-fast',180,d,150); print(msg); raise SystemExit(0 if ok else 1)"
      - run: .venv/bin/python tools/testing/security/check_invariant_coverage.py
      - run: .venv/bin/python tools/testing/harness/lane_runner.py --lane fg-fast --out-dir artifacts/testing
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: fg-fast-artifacts
          path: artifacts/testing
          if-no-files-found: warn

  fg-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            constraints.txt
            pyproject.toml
      - uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('requirements.txt', 'requirements-dev.txt', 'constraints.txt') }}
      - run: python -m venv .venv
      - run: make venv
      - run: mkdir -p artifacts/testing
      - run: |
          make fg-contract
          .venv/bin/python tools/testing/contracts/check_contract_drift.py
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: fg-contract-artifacts
          path: artifacts/testing
          if-no-files-found: warn

  fg-security:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            constraints.txt
            pyproject.toml
      - uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('requirements.txt', 'requirements-dev.txt', 'constraints.txt') }}
      - run: python -m venv .venv
      - run: make venv
      - run: mkdir -p artifacts/testing
      - run: make fg-security
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: fg-security-artifacts
          path: artifacts/testing
          if-no-files-found: warn

  fg-full:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [fg-fast, fg-contract, fg-security]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            constraints.txt
            pyproject.toml
      - uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('requirements.txt', 'requirements-dev.txt', 'constraints.txt') }}
      - run: python -m venv .venv
      - run: make venv
      - run: mkdir -p artifacts/testing
      - run: make fg-full
      - run: .venv/bin/python -m pytest -q tests/tools/test_flake_detection.py --junitxml artifacts/testing/junit.xml || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: fg-full-artifacts
          path: artifacts/testing
          if-no-files-found: warn
      - name: update runtime baseline (main only)
        if: github.ref_name == 'main' && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
        run: .venv/bin/python tools/testing/harness/runtime_baseline.py --lane fg-full --duration 1200 --branch ${{ github.ref_name }} --event ${{ github.event_name }}

  fg-flake-detect:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [fg-full]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: make venv
      - run: mkdir -p artifacts/testing
      - uses: actions/download-artifact@v4
        with:
          name: fg-full-artifacts
          path: artifacts/testing
      - run: |
          test -f artifacts/testing/junit.xml || printf '%s\n' '<testsuites><testsuite name="empty" tests="0" failures="0"/></testsuites>' > artifacts/testing/junit.xml
      - run: .venv/bin/python tools/testing/harness/flake_detect.py --junit artifacts/testing/junit.xml --out artifacts/testing/flake-report.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: fg-flake-artifacts
          path: artifacts/testing
          if-no-files-found: warn

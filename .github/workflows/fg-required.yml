name: fg-required

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: fg-required-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  fg-required:
    name: fg-required
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: setup python + cache pip
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            constraints.txt
            pyproject.toml

      - name: verify workflow filename uniqueness
        shell: bash
        run: |
          set -euo pipefail
          test -f .github/workflows/fg-required.yml
          test ! -f .github/workflows/fg-required.yaml
          test ! -f .github/workflows/FG-required.yml

      - name: run hermetic tool tests
        shell: bash
        run: |
          set -euo pipefail
          python -m unittest -q tests.tools_minimal.test_fg_required_minimal

      - name: create venv
        shell: bash
        run: |
          set -euo pipefail
          python -m venv .venv

      - name: install deps (pinned)
        shell: bash
        run: |
          set -euo pipefail
          make venv

      - name: sanity check pytest-asyncio plugin version
        shell: bash
        run: |
          set -euo pipefail
          .venv/bin/python -c "import pytest_asyncio; print(pytest_asyncio.__version__)"

      - name: run required-tests gate resolution tests
        shell: bash
        run: |
          set -euo pipefail
          .venv/bin/python -m unittest -q tests.tools_minimal.test_required_tests_gate_resolution

      - name: run fg-required
        id: fg_required
        timeout-minutes: 20
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/fg-required artifacts/testing

          .venv/bin/python tools/testing/harness/fg_required.py \
            --global-budget-seconds 1200 \
            --lane-timeout-seconds 1200 \
            2>&1 | tee artifacts/fg-required/fg_required.log

      - name: dump failed lane logs (tail)
        if: failure()
        shell: bash
        run: |
          set +e
          echo "=== fg-required lanes directory ==="
          find artifacts/fg-required/lanes -maxdepth 2 -type f -name "lane.log" -print || true
          echo
          echo "=== tail lane.log files ==="
          for f in $(find artifacts/fg-required/lanes -type f -name "lane.log" 2>/dev/null); do
            echo
            echo "----- $f -----"
            tail -n 200 "$f" || true
          done

      - name: prepare artifacts dirs + fallback notice
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/testing artifacts/fg-required

          test -f artifacts/testing/_upload_notice.txt || \
            echo "fg-required artifact bundle prepared after failure" > artifacts/testing/_upload_notice.txt

          test -f artifacts/fg-required/_upload_notice.txt || \
            echo "fg-required artifact bundle prepared after failure" > artifacts/fg-required/_upload_notice.txt

      - name: collect lane logs (best effort)
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/fg-required

          for d in \
            artifacts/fg-required \
            artifacts/testing \
            artifacts/fg-required/lanes \
            artifacts/testing/lanes \
            artifacts/fg-required/lanes/fg-fast \
            artifacts/testing/lanes/fg-fast
          do
            test -d "$d" && echo "found dir: $d" || true
          done

          mapfile -t files < <(
            find . -maxdepth 6 -type f \( \
              -name "lane.log" -o \
              -name "*fg-required*" -o \
              -name "*required*" -o \
              -name "*.junit.xml" -o \
              -name "*pytest*.log" -o \
              -name "*pytest*.txt" -o \
              -name "*harness*.log" \
            \) 2>/dev/null | head -n 200
          )

          if [ "${#files[@]}" -gt 0 ]; then
            echo "collecting ${#files[@]} files into artifacts/fg-required/"
            for f in "${files[@]}"; do
              bn="$(basename "$f")"
              dest="artifacts/fg-required/$bn"
              if [ -e "$dest" ]; then
                h="$(printf '%s' "$f" | sha256sum | awk '{print $1}' | cut -c1-12)"
                dest="artifacts/fg-required/${h}__$bn"
              fi
              cp -a "$f" "$dest" || true
            done
          else
            echo "no extra lane logs found (best effort)"
          fi

      - name: verify required artifacts
        if: success()
        shell: bash
        run: |
          set -euo pipefail
          test -f artifacts/testing/fg-required-summary.json
          test -f artifacts/testing/fg-required-summary.md

      - name: job summary
        if: always()
        shell: bash
        run: |
          {
            echo "## fg-required"
            echo ""
            echo "- Status: **${{ job.status }}**"
            echo "- Artifact bundle: **fg-required-artifacts**"
            echo "- Debug paths:"
            echo "  - artifacts/fg-required/"
            echo "  - artifacts/testing/"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fg-required-artifacts
          path: |
            artifacts/fg-required/**
            artifacts/gates/**
            artifacts/docker/**
            artifacts/testing/**
            artifacts/**/_upload_notice.txt
          if-no-files-found: warn
          retention-days: 7
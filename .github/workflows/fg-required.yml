name: fg-required

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/fg-required.yml"
      - "tools/testing/**"
      - "tools/ci/**"
      - "tests/tools_minimal/**"
      - "tests/**"
      - "Makefile"
      - "requirements.txt"
      - "requirements-dev.txt"
      - "requirements.lock"
      - "requirements-dev.lock"
      - "constraints.txt"
      - "pyproject.toml"
  workflow_dispatch:

concurrency:
  group: fg-required-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  fg-required:
    name: fg-required
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      PYTHONUNBUFFERED: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PIP_NO_PYTHON_VERSION_WARNING: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12 with pip cache
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            requirements.lock
            requirements-dev.lock
            constraints.txt
            pyproject.toml

      - name: Verify workflow filename uniqueness
        shell: bash
        run: |
          set -euo pipefail
          test -f .github/workflows/fg-required.yml
          test ! -f .github/workflows/fg-required.yaml
          test ! -f .github/workflows/FG-required.yml

      - name: Run hermetic minimal tool tests
        shell: bash
        run: |
          set -euo pipefail
          python -m unittest -q tests.tools_minimal.test_fg_required_minimal

      - name: Create virtual environment
        shell: bash
        run: |
          set -euo pipefail
          python -m venv .venv

      - name: Install pinned dependencies
        shell: bash
        run: |
          set -euo pipefail
          make venv

      - name: Record toolchain snapshot
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/fg-required
          {
            echo "python=$(python --version 2>&1)"
            echo "venv_python=$(.venv/bin/python --version 2>&1)"
            echo "pip=$(.venv/bin/pip --version 2>&1)"
            echo "pytest_asyncio=$(.venv/bin/python -c 'import pytest_asyncio; print(pytest_asyncio.__version__)')"
          } | tee artifacts/fg-required/toolchain.txt

      - name: Run required-tests gate resolution tests
        shell: bash
        run: |
          set -euo pipefail
          .venv/bin/python -m unittest -q tests.tools_minimal.test_required_tests_gate_resolution

      - name: Prepare artifact directories
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/fg-required artifacts/testing artifacts/gates artifacts/docker

      - name: Run fg-required harness
        id: fg_required
        timeout-minutes: 10
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p artifacts/fg-required artifacts/testing

          .venv/bin/python tools/testing/harness/fg_required.py \
            --global-budget-seconds 480 \
            --lane-timeout-seconds 480 \
            2>&1 | tee artifacts/fg-required/fg-required.stdout.log

      - name: Prepare fallback artifact notices
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p artifacts/testing artifacts/fg-required artifacts/gates artifacts/docker

          test -f artifacts/testing/_upload_notice.txt || \
            echo "fg-required artifact bundle prepared after failure" > artifacts/testing/_upload_notice.txt

          test -f artifacts/fg-required/_upload_notice.txt || \
            echo "fg-required artifact bundle prepared after failure" > artifacts/fg-required/_upload_notice.txt

      - name: Collect lane logs and debug files
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p artifacts/fg-required/collected

          for d in \
            artifacts/fg-required \
            artifacts/testing \
            artifacts/fg-required/lanes \
            artifacts/testing/lanes \
            artifacts/fg-required/lanes/fg-fast \
            artifacts/testing/lanes/fg-fast
          do
            test -d "$d" && echo "found dir: $d" || true
          done

          mapfile -t files < <(
            find . -maxdepth 6 -type f \( \
              -name "lane.log" -o \
              -name "*fg-required*" -o \
              -name "*required*" -o \
              -name "*.junit.xml" -o \
              -name "*pytest*.log" -o \
              -name "*pytest*.txt" -o \
              -name "*harness*.log" -o \
              -name "*summary.json" -o \
              -name "*summary.md" \
            \) 2>/dev/null | sort | head -n 250
          )

          if [ "${#files[@]}" -gt 0 ]; then
            echo "collecting ${#files[@]} files into artifacts/fg-required/collected/"
            for f in "${files[@]}"; do
              bn="$(basename "$f")"
              dest="artifacts/fg-required/collected/$bn"
              if [ -e "$dest" ]; then
                h="$(printf '%s' "$f" | sha256sum | awk '{print $1}' | cut -c1-12)"
                dest="artifacts/fg-required/collected/${h}__$bn"
              fi
              cp -a "$f" "$dest" || true
            done
          else
            echo "no extra lane logs found (best effort)"
          fi

      - name: Verify required summary artifacts
        if: success()
        shell: bash
        run: |
          set -euo pipefail
          test -f artifacts/testing/fg-required-summary.json
          test -f artifacts/testing/fg-required-summary.md

      - name: Publish job summary
        if: always()
        shell: bash
        run: |
          {
            echo "## fg-required"
            echo ""
            echo "- Status: **${{ job.status }}**"
            echo "- Artifact bundle: **fg-required-artifacts**"
            echo "- Debug paths:"
            echo "  - artifacts/fg-required/"
            echo "  - artifacts/testing/"
            echo "  - artifacts/gates/"
            echo "  - artifacts/docker/"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fg-required-artifacts-${{ github.run_attempt }}
          path: |
            artifacts/fg-required/**
            artifacts/gates/**
            artifacts/docker/**
            artifacts/testing/**
            artifacts/**/_upload_notice.txt
          if-no-files-found: warn
          retention-days: 7